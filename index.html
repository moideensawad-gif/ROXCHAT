        const firebaseConfig = {
            apiKey: "AIzaSyAaqyhWJg8QmFzB4xKR5sJT8UetZEqZGrs",
            authDomain: "roxchat-529a0.firebaseapp.com",

            storageBucket: "roxchat-529a0.firebasestorage.app",

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed:', err));
            });
        }

        let currentTab = 'home';
        let mediaRecorder = null;
        let audioChunks = [];
        window.currentUserData = null;
        let tempAvatarBase64 = null;
        let currentActiveChatId = null;
        let currentActivePeerUid = null;

        let touchStartY = 0;
        let isPulling = false;

        function playNotificationSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15); 

                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch (e) {
                console.log("Audio Context error:", e);
            }
        }

        window.addEventListener('touchstart', e => {
            if (window.scrollY === 0) {
                touchStartY = e.touches[0].clientY;
                isPulling = true;
            }
        });

        window.addEventListener('touchmove', e => {
            if (!isPulling) return;
            const touchY = e.touches[0].clientY;
            const diff = touchY - touchStartY;
            if (diff > 120 && window.scrollY === 0) {
                isPulling = false;
                triggerRefresh();
            }
        });

        window.addEventListener('touchend', () => {
            isPulling = false;
        });

        function triggerRefresh() {
            const indicator = document.createElement('div');
            indicator.id = 'refreshIndicator';
            indicator.className = 'fixed top-4 left-0 right-0 mx-auto w-max bg-yellow-400 text-black px-4 py-1.5 rounded-full text-xs font-bold shadow-lg z-50 flex items-center space-x-2 animate-bounce';
            indicator.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>Refreshing feed...</span>`;
            document.body.appendChild(indicator);

            setTimeout(() => {
                if (indicator) indicator.remove();
                if (currentTab === 'home') renderHome();
                else if (currentTab === 'reels') renderReels();
                else if (currentTab === 'explore') renderExplore();
                else if (currentTab === 'chat') renderChatInboxList();
                else if (currentTab === 'profile') renderProfile();
            }, 800);
        }

        window.preloadUserData = async function() {
            if (!window.auth.currentUser) return;
            try {
                const userRef = window.doc(window.db, "users", window.auth.currentUser.uid);
                let userDoc = await window.getDoc(userRef);
                if (userDoc.exists()) {
                    window.currentUserData = userDoc.data();
                    tempAvatarBase64 = window.currentUserData.avatar;
                } else {
                    window.currentUserData = {
                        uid: window.auth.currentUser.uid,
                        username: window.auth.currentUser.email ? window.auth.currentUser.email.split('@')[0] : "user",
                        email: window.auth.currentUser.email || "",
                        avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + window.auth.currentUser.uid,
                        bio: "Hey there! I am using Roxchat.",
                        isPrivate: false,
                        pushNotifications: true
                    };
                    tempAvatarBase64 = window.currentUserData.avatar;
                    await window.setDoc(userRef, { ...window.currentUserData, createdAt: window.serverTimestamp() });
                }
            } catch (e) {
                console.error("Preload error:", e);
            }
        }

        function triggerPostPicker() { document.getElementById('postFileInput').click(); }
        function triggerStoryPicker() { document.getElementById('storyFileInput').click(); }
        function triggerAvatarPicker() { document.getElementById('avatarFileInput').click(); }

        function compressImage(file, maxWidth = 800, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function handlePostUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!window.currentUserData && window.auth.currentUser) {
                await window.preloadUserData();
            }

            const isVideo = file.type.startsWith('video');
            const caption = prompt("Enter a caption for your post:") || "";

            const loadingAlert = document.createElement('div');
            loadingAlert.id = 'uploadingAlert';
            loadingAlert.className = 'fixed top-4 left-0 right-0 mx-auto w-max bg-yellow-400 text-black px-4 py-2 rounded-full text-xs font-bold shadow-lg z-50 flex items-center space-x-2';
            loadingAlert.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>Uploading post...</span>`;
            document.body.appendChild(loadingAlert);

            try {
                let mediaBase64 = "";
                if (isVideo) {
                    mediaBase64 = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(file);
                    });
                } else {
                    mediaBase64 = await compressImage(file, 800, 0.7);
                }

                await window.addDoc(window.collection(window.db, "posts"), {
                    uid: window.auth.currentUser.uid,
                    username: window.currentUserData ? window.currentUserData.username : "User",
                    avatar: window.currentUserData ? window.currentUserData.avatar : "https://api.dicebear.com/7.x/avataaars/svg?seed=user",
                    mediaUrl: mediaBase64,
                    isVideo: isVideo,
                    caption: caption,
                    likesCount: 0,
                    commentsCount: 0,
                    sharesCount: 0,
                    createdAt: window.serverTimestamp()
                });

                if (document.getElementById('uploadingAlert')) document.getElementById('uploadingAlert').remove();
                alert("Post Published Successfully!");
                renderHome();
            } catch (err) {
                if (document.getElementById('uploadingAlert')) document.getElementById('uploadingAlert').remove();
                alert("Failed to publish post: " + err.message);
            }
        }

        async function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            tempAvatarBase64 = await compressImage(file, 300, 0.7);
            const avatarPreview = document.getElementById('profileAvatarPreview');
            if (avatarPreview) avatarPreview.src = tempAvatarBase64;
        }

        async function handleStoryUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!window.currentUserData && window.auth.currentUser) {
                await window.preloadUserData();
            }
            try {
                const base64Image = await compressImage(file, 700, 0.7);
                await window.addDoc(window.collection(window.db, "stories"), {
                    uid: window.auth.currentUser.uid,
                    username: window.currentUserData ? window.currentUserData.username : "User",
                    avatar: window.currentUserData ? window.currentUserData.avatar : "https://api.dicebear.com/7.x/avataaars/svg?seed=user",
                    imageUrl: base64Image,
                    createdAt: window.serverTimestamp()
                });
                alert("Story Posted Successfully!");
                renderHome();
            } catch (err) {
                alert("Failed to post story: " + err.message);
            }
        }

        async function handleChatMediaUpload(event) {
            const file = event.target.files[0];
            if (!file || !currentActiveChatId) return;
            const isVideo = file.type.startsWith('video');
            
            const loadingAlert = document.createElement('div');
            loadingAlert.id = 'mediaUploadingAlert';
            loadingAlert.className = 'fixed top-4 left-0 right-0 mx-auto w-max bg-yellow-400 text-black px-4 py-2 rounded-full text-xs font-bold shadow-lg z-50 flex items-center space-x-2';
            loadingAlert.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>Sending media...</span>`;
            document.body.appendChild(loadingAlert);

            try {
                let mediaBase64 = "";
                if (isVideo) {
                    mediaBase64 = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(file);
                    });
                } else {
                    mediaBase64 = await compressImage(file, 800, 0.7);
                }

                await sendPrivateMessage(currentActiveChatId, currentActivePeerUid, null, null, mediaBase64, isVideo);
                if (document.getElementById('mediaUploadingAlert')) document.getElementById('mediaUploadingAlert').remove();
            } catch (err) {
                if (document.getElementById('mediaUploadingAlert')) document.getElementById('mediaUploadingAlert').remove();
                alert("Failed to send media: " + err.message);
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            const tabs = ['home', 'chat', 'explore', 'reels', 'profile'];
            tabs.forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if (btn) {
                    if (t === tab) {
                        btn.classList.remove('text-zinc-400');
                        btn.classList.add('text-yellow-400');
                    } else {
                        btn.classList.remove('text-yellow-400');
                        btn.classList.add('text-zinc-400');
                    }
                }
            });

            if (tab === 'home') renderHome();
            else if (tab === 'explore') renderExplore();
            else if (tab === 'reels') renderReels();
            else if (tab === 'chat') renderChatInboxList();
            else if (tab === 'profile') renderProfile();
        }

        function renderLogin(isSignup = false) {
            document.getElementById('app').innerHTML = `

                    <div class="w-full max-w-sm bg-zinc-950 border border-zinc-800/80 p-8 rounded-2xl shadow-xl">

                            <h1 class="text-4xl brand-font tracking-wide text-yellow-400">Roxchat</h1>
                            <p class="text-xs text-zinc-500 mt-2">Connect with your world differently</p>
                        </div>
                        <div class="space-y-3.5">
                            ${isSignup ? '<input type="text" id="username" placeholder="Username (Unique)" class="w-full bg-zinc-900 border border-zinc-800 p-3.5 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400 transition">' : ''}
                            <input type="email" id="email" placeholder="Email address" class="w-full bg-zinc-900 border border-zinc-800 p-3.5 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400 transition">
                            <input type="password" id="password" placeholder="Password" class="w-full bg-zinc-900 border border-zinc-800 p-3.5 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400 transition">

                        <p class="text-xs text-zinc-400">
                            ${isSignup ? 'Already have an account?' : "Don't have an account?"}

        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await window.signInWithEmailAndPassword(window.auth, email, password);
            } catch (error) {
                alert("Login Error: " + error.message);
            }
        }

        async function handleSignup() {
            const usernameInput = document.getElementById('username').value.trim().toLowerCase();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!usernameInput) return alert("Please enter a username!");

            try {
                const q = window.query(window.collection(window.db, "users"), window.where("username", "==", usernameInput));
                const querySnapshot = await window.getDocs(q);
                if (!querySnapshot.empty) {
                    alert("Username is already taken.");
                    return;
                }

                const userCredential = await window.createUserWithEmailAndPassword(window.auth, email, password);
                const user = userCredential.user;

                window.currentUserData = {
                    uid: user.uid,
                    username: usernameInput,
                    email: email,
                    bio: "Hey there! I am using Roxchat.",
                    avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + usernameInput,
                    isPrivate: false,
                    pushNotifications: true,
                    createdAt: window.serverTimestamp()
                };

                await window.setDoc(window.doc(window.db, "users", user.uid), window.currentUserData);
                switchTab('home');
            } catch (error) {
                alert("Signup Error: " + error.message);
            }
        }

        async function renderHome() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div>
                    ${getTopHeaderHTML()}
                    ${getStoriesBarHTML()}
                    <div id="postsFeedContainer" class="space-y-4 px-4 pb-6">
                        <div class="text-center text-zinc-500 text-sm py-10">Loading posts feed...</div>
                    </div>
                </div>
            `;

            try {
                const q = window.query(window.collection(window.db, "posts"), window.orderBy("createdAt", "desc"));
                const querySnapshot = await window.getDocs(q);
                const feedContainer = document.getElementById('postsFeedContainer');

                if (querySnapshot.empty) {
                    feedContainer.innerHTML = `
                        <div class="text-center py-10 text-zinc-500 text-sm">
                            <p>No posts in feed yet.</p>
                            <span class="text-xs text-zinc-600">Tap (+) icon top right to upload!</span>
                        </div>
                    `;
                    return;
                }

                let html = '';
                const currentUid = window.auth.currentUser.uid;

                for (const docSnap of querySnapshot.docs) {
                    const post = docSnap.data();
                    const postId = docSnap.id;

                    const likeRef = window.doc(window.db, "posts", postId, "likes", currentUid);
                    const likeDoc = await window.getDoc(likeRef);
                    const isLiked = likeDoc.exists();

                    let mediaContent = `<img src="${post.mediaUrl}" class="w-full object-cover max-h-[450px]" loading="lazy">`;
                    if (post.isVideo) {
                        mediaContent = `<video src="${post.mediaUrl}" controls class="w-full object-cover max-h-[450px]"></video>`;
                    }

                    const likesCount = post.likesCount || 0;
                    const commentsCount = post.commentsCount || 0;
                    const sharesCount = post.sharesCount || 0;

                    html += `
                        <div class="bg-zinc-950 border border-zinc-900 rounded-2xl overflow-hidden shadow-lg mb-4">
                            <div class="flex items-center justify-between p-3">
                                <div class="flex items-center space-x-2.5">
                                    <img src="${post.avatar}" class="w-9 h-9 rounded-full bg-zinc-800 object-cover">
                                    <span class="font-bold text-sm text-white">${post.username}</span>
                                </div>
                            </div>
                            <div class="bg-black flex items-center justify-center">
                                ${mediaContent}
                            </div>
                            <!-- Instagram Style Action Bar -->
                            <div class="px-4 py-3 flex items-center justify-between border-b border-zinc-900">
                                <div class="flex items-center space-x-5">
                                    <button onclick="toggleLikePost('${postId}')" class="flex items-center space-x-1.5 text-xl transition active:scale-125">
                                        <i class="${isLiked ? 'fa-solid fa-heart text-red-500' : 'fa-regular fa-heart text-white'}"></i>
                                        <span class="text-xs font-bold text-zinc-300">${likesCount}</span>
                                    </button>
                                    <button onclick="openCommentsModal('${postId}')" class="flex items-center space-x-1.5 text-xl text-white transition active:scale-125">
                                        <i class="fa-regular fa-comment"></i>
                                        <span class="text-xs font-bold text-zinc-300">${commentsCount}</span>
                                    </button>
                                    <button onclick="sharePost('${postId}')" class="flex items-center space-x-1.5 text-xl text-white transition active:scale-125">
                                        <i class="fa-regular fa-paper-plane"></i>
                                        <span class="text-xs font-bold text-zinc-300">${sharesCount}</span>
                                    </button>
                                </div>
                            </div>
                            <div class="p-3 text-sm">
                                <p class="text-zinc-200"><strong class="text-white mr-2">${post.username}</strong>${post.caption || ''}</p>
                            </div>
                        </div>
                    `;
                }
                feedContainer.innerHTML = html;
            } catch (e) {
                console.error("Error loading feed:", e);
            }
        }

        window.toggleLikePost = async function(postId) {
            const currentUid = window.auth.currentUser.uid;
            const postRef = window.doc(window.db, "posts", postId);
            const likeRef = window.doc(window.db, "posts", postId, "likes", currentUid);

            try {
                const likeDoc = await window.getDoc(likeRef);
                const postDoc = await window.getDoc(postRef);
                let currentLikes = postDoc.data().likesCount || 0;

                if (likeDoc.exists()) {
                    await window.deleteDoc(likeRef);
                    currentLikes = Math.max(0, currentLikes - 1);
                    await window.updateDoc(postRef, { likesCount: currentLikes });
                } else {
                    await window.setDoc(likeRef, { timestamp: window.serverTimestamp() });
                    currentLikes += 1;
                    await window.updateDoc(postRef, { likesCount: currentLikes });

                    if (postDoc.data().uid !== currentUid) {
                        await window.addDoc(window.collection(window.db, "notifications"), {
                            receiverUid: postDoc.data().uid,
                            senderUid: currentUid,
                            senderUsername: window.currentUserData?.username || "Someone",
                            type: 'like',
                            text: 'liked your post.',
                            timestamp: window.serverTimestamp()
                        });
                    }
                }
                renderHome();
            } catch (e) {
                console.error("Error toggling like:", e);
            }
        }

        window.openCommentsModal = async function(postId) {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="flex flex-col h-screen bg-black">
                    <div class="flex items-center justify-between p-4 bg-zinc-950 border-b border-zinc-800">
                        <button onclick="renderHome()" class="text-zinc-400 text-lg"><i class="fa-solid fa-arrow-left"></i></button>
                        <h2 class="font-bold text-white">Comments</h2>
                        <div class="w-6"></div>
                    </div>
                    <div id="commentsContainer" class="flex-1 overflow-y-auto p-4 space-y-3 pb-24">
                        <div class="text-center text-zinc-500 text-xs">Loading comments...</div>
                    </div>
                    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-3 bg-zinc-950 border-t border-zinc-800 flex items-center space-x-2">
                        <input type="text" id="commentInput" placeholder="Add a comment..." class="flex-1 bg-zinc-900 border border-zinc-800 text-white p-3 rounded-xl text-sm focus:outline-none focus:border-yellow-400">
                        <button onclick="postComment('${postId}')" class="bg-yellow-400 text-black px-4 py-3 rounded-xl font-bold text-sm">Post</button>
                    </div>
                </div>
            `;
            loadComments(postId);
        }

        async function loadComments(postId) {
            const container = document.getElementById('commentsContainer');
            try {
                const q = window.query(window.collection(window.db, "posts", postId, "comments"), window.orderBy("timestamp", "asc"));
                const snapshot = await window.getDocs(q);

                if (snapshot.empty) {
                    container.innerHTML = `<div class="text-center text-zinc-500 text-sm py-10">No comments yet. Be the first to comment!</div>`;
                    return;
                }

                let html = '';
                snapshot.forEach(docSnap => {
                    const com = docSnap.data();
                    html += `
                        <div class="bg-zinc-900/60 border border-zinc-800 p-3 rounded-xl">
                            <div class="flex items-center space-x-2 mb-1">
                                <span class="font-bold text-xs text-yellow-400">${com.username}</span>
                            </div>
                            <p class="text-sm text-zinc-200">${com.text}</p>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (e) {
                console.error("Error loading comments:", e);
            }
        }

        window.postComment = async function(postId) {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if (!text) return;

            if (!window.currentUserData && window.auth.currentUser) {
                await window.preloadUserData();
            }

            try {
                await window.addDoc(window.collection(window.db, "posts", postId, "comments"), {
                    uid: window.auth.currentUser.uid,
                    username: window.currentUserData?.username || "User",
                    text: text,
                    timestamp: window.serverTimestamp()
                });

                const postRef = window.doc(window.db, "posts", postId);
                const postDoc = await window.getDoc(postRef);
                const currentCount = postDoc.data().commentsCount || 0;
                await window.updateDoc(postRef, { commentsCount: currentCount + 1 });

                input.value = '';
                loadComments(postId);
            } catch (e) {
                alert("Failed to post comment: " + e.message);
            }
        }

        window.sharePost = async function(postId) {
            try {
                const postRef = window.doc(window.db, "posts", postId);
                const postDoc = await window.getDoc(postRef);
                const currentShares = postDoc.data().sharesCount || 0;
                await window.updateDoc(postRef, { sharesCount: currentShares + 1 });

                if (navigator.share) {
                    await navigator.share({
                        title: 'Check out this post on Roxchat',
                        url: window.location.href
                    });
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    alert("Post link copied to clipboard!");
                }
                renderHome();
            } catch (e) {
                console.error("Error sharing post:", e);
            }
        }

        async function renderNotifications() {

                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold text-yellow-400">Notifications</h2>
                        <button onclick="switchTab('home')" class="text-zinc-400 text-sm"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    </div>
                    <div id="notifList" class="space-y-3">
                        <div class="text-center text-zinc-500 text-sm py-10">Loading notifications...</div>
                    </div>
                </div>
            `;

            try {
                const q = window.query(
                    window.collection(window.db, "notifications"),

                    window.orderBy("timestamp", "desc")
                );
                const snapshot = await window.getDocs(q);

                if (snapshot.empty) {
                    notifList.innerHTML = `<div class="text-center text-zinc-500 text-sm py-10">No notifications yet.</div>`;
                    return;
                }

                    const notif = docSnap.data();

                    if(notif.type === 'comment') icon = "fa-comment text-blue-400";

        async function renderExplore() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div>
                    ${getTopHeaderHTML()}
                    <div class="p-4 pt-0">
                        <h2 class="text-xl font-bold mb-4 text-yellow-400">Search Friends</h2>
                        <div class="mb-4">
                            <input type="text" id="searchInput" placeholder="Search users..." oninput="filterSearchUsers(this.value)" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400">
                        </div>
                        <div id="exploreUsersList" class="space-y-3 text-center text-zinc-400">Loading users...</div>
                    </div>
                </div>
            `;
            
            try {
                const querySnapshot = await window.getDocs(window.collection(window.db, "users"));
                window.allExploreUsers = [];
                querySnapshot.forEach((docSnap) => {
                    const userData = docSnap.data();
                    if(userData.uid !== window.auth.currentUser.uid) {
                        window.allExploreUsers.push(userData);
                    }
                });
                renderUserSearchResults(window.allExploreUsers);

        function renderUserSearchResults(users) {
            let usersListDiv = document.getElementById('exploreUsersList');
            if(!usersListDiv) return;
            
            if(users.length === 0) {
                usersListDiv.innerHTML = `<div class="text-zinc-500 text-sm py-6">No users found.</div>`;
                return;
            }

            let usersHTML = `<div class="space-y-3">`;
            users.forEach((userData) => {
                usersHTML += `
                    <div onclick="openChatRoom('${userData.uid}', '${userData.username}')" class="flex items-center justify-between bg-zinc-900 border border-zinc-800 p-3.5 rounded-xl cursor-pointer hover:border-yellow-400 transition">
                        <div class="flex items-center space-x-3">
                            <img src="${userData.avatar}" class="w-10 h-10 rounded-full bg-zinc-800 object-cover">
                            <span class="font-semibold text-white">${userData.username}</span>
                        </div>
                        <i class="fa-solid fa-comments text-yellow-400 text-lg"></i>
                    </div>
                `;
            });
            usersHTML += `</div>`;
            usersListDiv.innerHTML = usersHTML;
        }

        window.filterSearchUsers = function(queryText) {
            if(!window.allExploreUsers) return;
            const filtered = window.allExploreUsers.filter(u => u.username.toLowerCase().includes(queryText.toLowerCase()));
            renderUserSearchResults(filtered);
        }

        async function renderChatInboxList() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div>
                    ${getTopHeaderHTML()}
                    <div class="p-4 pt-0">
                        <h2 class="text-xl font-bold mb-4 text-yellow-400">Direct Messages</h2>
                        <div id="directUsersList" class="space-y-3 text-center text-zinc-400">Loading chats...</div>
                    </div>

        async function openChatRoom(peerUid, peerUsername) {
            const currentUid = window.auth.currentUser.uid;
            const chatId = currentUid < peerUid ? `${currentUid}_${peerUid}` : `${peerUid}_${currentUid}`;
            
            currentActiveChatId = chatId;
            currentActivePeerUid = peerUid;

            document.getElementById('app').innerHTML = `
                <div class="flex flex-col h-screen bg-black">
                    <div class="flex items-center justify-between p-4 bg-zinc-950 border-b border-zinc-800">
                        <button onclick="switchTab('chat')" class="text-zinc-400 text-lg"><i class="fa-solid fa-arrow-left"></i></button>
                        <h2 class="font-bold text-white">${peerUsername}</h2>
                        <div class="w-6"></div>
                    </div>
                    
                    <div id="messageContainer" class="flex-1 overflow-y-auto p-4 space-y-3 pb-24">
                        <div class="text-center text-zinc-500 text-xs">Private chat room with ${peerUsername}.</div>
                    </div>
                    
                    <div class="fixed bottom-16 left-0 right-0 max-w-md mx-auto p-3 bg-zinc-950 border-t border-zinc-800 flex items-center space-x-2">
                        <button onclick="document.getElementById('chatFileInput').click()" class="text-zinc-400 hover:text-yellow-400 text-xl px-2"><i class="fa-solid fa-paperclip"></i></button>
                        <input type="text" id="chatInput" placeholder="Message..." class="flex-1 bg-zinc-900 border border-zinc-800 text-white p-3 rounded-xl text-sm focus:outline-none focus:border-yellow-400">
                        <button onclick="toggleVoiceRecord('${chatId}', '${peerUid}')" id="micBtn" class="bg-zinc-800 hover:bg-zinc-700 text-yellow-400 px-3.5 py-3 rounded-xl text-sm"><i class="fa-solid fa-microphone"></i></button>
                        <button onclick="sendPrivateMessage('${chatId}', '${peerUid}')" class="bg-yellow-400 text-black px-4 py-3 rounded-xl font-bold text-sm">Send</button>
                    </div>
                </div>
            `;
            loadPrivateMessages(chatId);
        }

        async function sendPrivateMessage(chatId, peerUid, customText = null, audioUrl = null, mediaUrl = null, isVideo = false) {
            const input = document.getElementById('chatInput');
            const text = customText || (input ? input.value.trim() : '');
            if (!text && !audioUrl && !mediaUrl) return;
            
            if (!window.currentUserData && window.auth.currentUser) {
                await window.preloadUserData();
            }

            try {
                let msgData = {
                    sender: window.auth.currentUser.uid,
                    timestamp: window.serverTimestamp()
                };

                if(audioUrl) {
                    msgData.audioUrl = audioUrl;
                    msgData.text = "[Voice Note]";
                } else if(mediaUrl) {
                    msgData.mediaUrl = mediaUrl;
                    msgData.isVideo = isVideo;
                    msgData.text = isVideo ? "[Video]" : "[Photo]";
                } else {
                    msgData.text = text;
                }

                await window.addDoc(window.collection(window.db, "chats", chatId, "messages"), msgData);

                const senderUsername = window.currentUserData ? window.currentUserData.username : "Someone";
                let notifText = `sent you a message.`;
                if(audioUrl) notifText = `sent you a voice note.`;
                if(mediaUrl) notifText = isVideo ? `sent you a video.` : `sent you a photo.`;

                await window.addDoc(window.collection(window.db, "notifications"), {
                    receiverUid: peerUid,
                    senderUid: window.auth.currentUser.uid,
                    senderUsername: senderUsername,
                    type: 'message',
                    text: notifText,
                    timestamp: window.serverTimestamp()
                });

                if(input && !customText) input.value = '';
                loadPrivateMessages(chatId);
            } catch (e) {
                console.error("Error sending message: ", e);
            }
        }

        async function toggleVoiceRecord(chatId, peerUid) {
            const micBtn = document.getElementById('micBtn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = async () => {
                            await sendPrivateMessage(chatId, peerUid, null, reader.result);
                        };
                    };

                    mediaRecorder.start();
                    micBtn.classList.remove('bg-zinc-800', 'text-yellow-400');
                    micBtn.classList.add('bg-red-600', 'text-white', 'animate-pulse');
                } catch (e) {
                    alert("Microphone access denied.");
                }
            } else {
                mediaRecorder.stop();
                micBtn.classList.remove('bg-red-600', 'text-white', 'animate-pulse');
                micBtn.classList.add('bg-zinc-800', 'text-yellow-400');
            }
        }

        async function loadPrivateMessages(chatId) {
            const container = document.getElementById('messageContainer');
            try {
                const q = window.query(window.collection(window.db, "chats", chatId, "messages"), window.orderBy("timestamp", "asc"));
                const snapshot = await window.getDocs(q);
                
                let html = '';
                let messageCount = 0;
                snapshot.forEach(docSnap => {
                    const msg = docSnap.data();
                    messageCount++;
                    const isMe = msg.sender === window.auth.currentUser.uid;
                    
                    let contentHtml = msg.text;
                    if(msg.audioUrl) {
                        contentHtml = `<audio controls class="h-8 max-w-[200px]"><source src="${msg.audioUrl}" type="audio/webm"></audio>`;
                    } else if(msg.mediaUrl) {
                        if(msg.isVideo) {
                            contentHtml = `<video src="${msg.mediaUrl}" controls class="max-w-full rounded-xl max-h-[250px] object-cover"></video>`;
                        } else {
                            contentHtml = `<img src="${msg.mediaUrl}" class="max-w-full rounded-xl max-h-[250px] object-cover">`;
                        }
                    }

                    html += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                            <div class="max-w-[70%] p-3 rounded-2xl text-sm ${isMe ? 'bg-yellow-400 text-black rounded-br-none' : 'bg-zinc-900 text-white border border-zinc-800 rounded-bl-none'}">
                                ${contentHtml}
                            </div>
                        </div>
                    `;
                });
                
                if (!container.dataset.lastCount || parseInt(container.dataset.lastCount) < messageCount) {
                    if (snapshot.docs.length > 0) {
                        const lastMsg = snapshot.docs[snapshot.docs.length - 1].data();
                        if (lastMsg.sender !== window.auth.currentUser.uid) playNotificationSound();
                    }
                }
                container.dataset.lastCount = messageCount;
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                console.error("Error loading messages:", e);
            }
        }

        async function saveProfileChanges() {
            const newUsername = document.getElementById('editUsername').value.trim().toLowerCase();
            const newBio = document.getElementById('editBio').value.trim();
            if (!newUsername) return alert("Username cannot be empty!");

            try {
                const userRef = window.doc(window.db, "users", window.auth.currentUser.uid);
                await window.updateDoc(userRef, {
                    username: newUsername,
                    avatar: tempAvatarBase64,
                    bio: newBio
                });
                window.currentUserData.username = newUsername;
                window.currentUserData.bio = newBio;
                window.currentUserData.avatar = tempAvatarBase64;
                alert("Profile Updated Successfully!");
            } catch (e) {
                alert("Error updating profile: " + e.message);
            }
        }

        async function handleLogout() {
            try {
                await window.signOut(window.auth);
                window.currentUserData = null;
            } catch (e) {
                alert("Logout Error: " + e.message);
            }
        }
    </script>
