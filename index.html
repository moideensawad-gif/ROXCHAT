    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed:', err));

        let currentTab = 'home';
        let mediaRecorder = null;
        let audioChunks = [];
        window.currentUserData = null;
        let tempAvatarBase64 = null;
        let currentActiveChatId = null;
        let currentActivePeerUid = null;

        let touchStartY = 0;
        let isPulling = false;

        // Notification Beep Sound System using Web Audio API
        function playNotificationSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5 note
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15); // A5 note

                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch (e) {
                console.log("Audio Context error:", e);
            }
        }

        window.addEventListener('touchstart', e => {
            if (window.scrollY === 0) {
                touchStartY = e.touches[0].clientY;
                isPulling = true;
            }
        });

        window.addEventListener('touchmove', e => {
            if (!isPulling) return;
            const touchY = e.touches[0].clientY;
            const diff = touchY - touchStartY;
            if (diff > 120 && window.scrollY === 0) {
                isPulling = false;
                triggerRefresh();
            }
        });

        window.addEventListener('touchend', () => {
            isPulling = false;
        });

        function triggerRefresh() {
            const indicator = document.createElement('div');
            indicator.id = 'refreshIndicator';
            indicator.className = 'fixed top-4 left-0 right-0 mx-auto w-max bg-yellow-400 text-black px-4 py-1.5 rounded-full text-xs font-bold shadow-lg z-50 flex items-center space-x-2 animate-bounce';
            indicator.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>Refreshing feed...</span>`;
            document.body.appendChild(indicator);

            setTimeout(() => {
                if (indicator) indicator.remove();
                if (currentTab === 'home') renderHome();
                else if (currentTab === 'reels') renderReels();
                else if (currentTab === 'explore') renderExplore();
                else if (currentTab === 'chat') renderChatInboxList();
                else if (currentTab === 'profile') renderProfile();
            }, 800);
        }

        window.preloadUserData = async function() {
            if (!window.auth.currentUser) return;
            try {
                const userRef = window.doc(window.db, "users", window.auth.currentUser.uid);
                let userDoc = await window.getDoc(userRef);
                if (userDoc.exists()) {
                    window.currentUserData = userDoc.data();
                    tempAvatarBase64 = window.currentUserData.avatar;
                } else {
                    window.currentUserData = {
                        uid: window.auth.currentUser.uid,
                        username: window.auth.currentUser.email ? window.auth.currentUser.email.split('@')[0] : "user",
                        email: window.auth.currentUser.email || "",
                        avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + window.auth.currentUser.uid,
                        bio: "Hey there! I am using Roxchat.",
                        isPrivate: false,
                        pushNotifications: true
                    };
                    tempAvatarBase64 = window.currentUserData.avatar;
                    await window.setDoc(userRef, { ...window.currentUserData, createdAt: window.serverTimestamp() });
                }
            } catch (e) {
                console.error("Preload error:", e);
            }
        }

        function triggerPostPicker() {
            document.getElementById('postFileInput').click();

        function triggerStoryPicker() {
            document.getElementById('storyFileInput').click();

        function triggerAvatarPicker() {
            document.getElementById('avatarFileInput').click();
        }

        function compressImage(file, maxWidth = 800, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function handlePostUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!window.currentUserData && window.auth.currentUser) {
                await window.preloadUserData();
            }

            const isVideo = file.type.startsWith('video');
            const caption = prompt("Enter a caption for your post:") || "";

            const loadingAlert = document.createElement('div');
            loadingAlert.id = 'uploadingAlert';
            loadingAlert.className = 'fixed top-4 left-0 right-0 mx-auto w-max bg-yellow-400 text-black px-4 py-2 rounded-full text-xs font-bold shadow-lg z-50 flex items-center space-x-2';
            loadingAlert.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>Uploading post...</span>`;
            document.body.appendChild(loadingAlert);

            try {
                let mediaBase64 = "";
                if (isVideo) {
                    mediaBase64 = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(file);
                    });
                } else {
                    mediaBase64 = await compressImage(file, 800, 0.7);
                }

                await window.addDoc(window.collection(window.db, "posts"), {
                    uid: window.auth.currentUser.uid,
                    username: window.currentUserData ? window.currentUserData.username : "User",
                    avatar: window.currentUserData ? window.currentUserData.avatar : "https://api.dicebear.com/7.x/avataaars/svg?seed=user",
                    mediaUrl: mediaBase64,
                    isVideo: isVideo,
                    caption: caption,
                    createdAt: window.serverTimestamp()
                });

                if (document.getElementById('uploadingAlert')) document.getElementById('uploadingAlert').remove();
                alert("Post Published Successfully!");
                renderHome();
            } catch (err) {
                if (document.getElementById('uploadingAlert')) document.getElementById('uploadingAlert').remove();
                alert("Failed to publish post: " + err.message);
            }
        }

        async function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            tempAvatarBase64 = await compressImage(file, 300, 0.7);
            const avatarPreview = document.getElementById('profileAvatarPreview');
            if (avatarPreview) avatarPreview.src = tempAvatarBase64;
        }

        async function handleStoryUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!window.currentUserData && window.auth.currentUser) {
                await window.preloadUserData();
            }

            try {
                const base64Image = await compressImage(file, 700, 0.7);
                await window.addDoc(window.collection(window.db, "stories"), {
                    uid: window.auth.currentUser.uid,
                    username: window.currentUserData ? window.currentUserData.username : "User",
                    avatar: window.currentUserData ? window.currentUserData.avatar : "https://api.dicebear.com/7.x/avataaars/svg?seed=user",
                    imageUrl: base64Image,
                    createdAt: window.serverTimestamp()
                });
                alert("Story Posted Successfully!");
                renderHome();
            } catch (err) {
                alert("Failed to post story: " + err.message);
            }
        }

        async function handleChatMediaUpload(event) {
            const file = event.target.files[0];
            if (!file || !currentActiveChatId) return;

            const isVideo = file.type.startsWith('video');
            
            const loadingAlert = document.createElement('div');
            loadingAlert.id = 'mediaUploadingAlert';
            loadingAlert.className = 'fixed top-4 left-0 right-0 mx-auto w-max bg-yellow-400 text-black px-4 py-2 rounded-full text-xs font-bold shadow-lg z-50 flex items-center space-x-2';
            loadingAlert.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>Sending media...</span>`;
            document.body.appendChild(loadingAlert);

            try {
                let mediaBase64 = "";
                if (isVideo) {
                    mediaBase64 = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(file);
                    });
                } else {
                    mediaBase64 = await compressImage(file, 800, 0.7);
                }

                await sendPrivateMessage(currentActiveChatId, currentActivePeerUid, null, null, mediaBase64, isVideo);
                if (document.getElementById('mediaUploadingAlert')) document.getElementById('mediaUploadingAlert').remove();
            } catch (err) {
                if (document.getElementById('mediaUploadingAlert')) document.getElementById('mediaUploadingAlert').remove();
                alert("Failed to send media: " + err.message);
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            const tabs = ['home', 'chat', 'explore', 'reels', 'profile'];
            tabs.forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if (btn) {
                    if (t === tab) {
                        btn.classList.remove('text-zinc-400');
                        btn.classList.add('text-yellow-400');
                    } else {
                        btn.classList.remove('text-yellow-400');
                        btn.classList.add('text-zinc-400');
                    }
                }
            });

            if (tab === 'home') renderHome();
            else if (tab === 'explore') renderExplore();
            else if (tab === 'reels') renderReels();
            else if (tab === 'chat') renderChatInboxList();
            else if (tab === 'profile') renderProfile();
        }

        function renderLogin(isSignup = false) {
            document.getElementById('app').innerHTML = `
                <div class="p-6 flex flex-col justify-center items-center min-h-screen bg-black">
                    <div class="w-full max-w-sm bg-zinc-950 border border-zinc-800/80 p-8 rounded-2xl shadow-xl">
                        <div class="text-center mb-8">
                            <h1 class="text-4xl brand-font tracking-wide text-yellow-400">Roxchat</h1>
                            <p class="text-xs text-zinc-500 mt-2">Connect with your world differently</p>
                        </div>
                        <div class="space-y-3.5">
                            ${isSignup ? '<input type="text" id="username" placeholder="Username (Unique)" class="w-full bg-zinc-900 border border-zinc-800 p-3.5 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400 transition">' : ''}
                            <input type="email" id="email" placeholder="Email address" class="w-full bg-zinc-900 border border-zinc-800 p-3.5 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400 transition">
                            <input type="password" id="password" placeholder="Password" class="w-full bg-zinc-900 border border-zinc-800 p-3.5 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400 transition">
                            <button id="authSubmitBtn" onclick="${isSignup ? 'handleSignup()' : 'handleLogin()'}" class="w-full bg-yellow-400 hover:bg-yellow-500 text-black p-3.5 rounded-xl font-bold text-sm transition shadow-lg shadow-yellow-400/10 mt-2">${isSignup ? 'Create Account' : 'Sign In'}</button>

                        <p class="text-xs text-zinc-400">
                            ${isSignup ? 'Already have an account?' : "Don't have an account?"} 
                            <span class="text-yellow-400 font-bold cursor-pointer ml-1" onclick="renderLogin(${!isSignup})">${isSignup ? 'Sign In' : 'Sign up'}</span>
                        </p>

            `;
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const btn = document.getElementById('authSubmitBtn');
            if(btn) {
                btn.className = "w-full bg-zinc-800 text-zinc-500 p-3.5 rounded-xl font-bold text-sm transition mt-2 cursor-not-allowed";
                btn.innerText = "Signing in...";
            }

            try {
                await window.signInWithEmailAndPassword(window.auth, email, password);
            } catch (error) {
                alert("Login Error: " + error.message);
                if(btn) {
                    btn.className = "w-full bg-yellow-400 hover:bg-yellow-500 text-black p-3.5 rounded-xl font-bold text-sm transition shadow-lg shadow-yellow-400/10 mt-2";
                    btn.innerText = "Sign In";
                }
            }
        }

        async function handleSignup() {
            const usernameInput = document.getElementById('username').value.trim().toLowerCase();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!usernameInput) return alert("Please enter a username!");

            const btn = document.getElementById('authSubmitBtn');
            if(btn) {
                btn.className = "w-full bg-zinc-800 text-zinc-500 p-3.5 rounded-xl font-bold text-sm transition mt-2 cursor-not-allowed";
                btn.innerText = "Creating Account...";
            }

            try {
                const q = window.query(window.collection(window.db, "users"), window.where("username", "==", usernameInput));
                const querySnapshot = await window.getDocs(q);
                
                if (!querySnapshot.empty) {
                    alert("Username is already taken. Choose another one.");
                    if(btn) {
                        btn.className = "w-full bg-yellow-400 hover:bg-yellow-500 text-black p-3.5 rounded-xl font-bold text-sm transition shadow-lg shadow-yellow-400/10 mt-2";
                        btn.innerText = "Create Account";
                    }
                    return;
                }

                const userCredential = await window.createUserWithEmailAndPassword(window.auth, email, password);
                const user = userCredential.user;

                window.currentUserData = {
                    uid: user.uid,
                    username: usernameInput,
                    email: email,
                    bio: "Hey there! I am using Roxchat.",
                    avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + usernameInput,
                    isPrivate: false,
                    pushNotifications: true,
                    createdAt: window.serverTimestamp()
                };

                await window.setDoc(window.doc(window.db, "users", user.uid), window.currentUserData);
                switchTab('home');
            } catch (error) {
                alert("Signup Error: " + error.message);
                if(btn) {
                    btn.className = "w-full bg-yellow-400 hover:bg-yellow-500 text-black p-3.5 rounded-xl font-bold text-sm transition shadow-lg shadow-yellow-400/10 mt-2";
                    btn.innerText = "Create Account";
                }
            }
        }

        async function renderHome() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div>
                    ${getTopHeaderHTML()}
                    ${getStoriesBarHTML()}
                    <div id="postsFeedContainer" class="space-y-4 px-4 pb-6">
                        <div class="text-center text-zinc-500 text-sm py-10">Loading posts feed...</div>
                    </div>
                </div>
            `;

            try {
                const q = window.query(window.collection(window.db, "posts"), window.orderBy("createdAt", "desc"));
                const querySnapshot = await window.getDocs(q);
                const feedContainer = document.getElementById('postsFeedContainer');

                if (querySnapshot.empty) {
                    feedContainer.innerHTML = `
                        <div class="text-center py-10 text-zinc-500 text-sm">
                            <p>No posts in feed yet.</p>
                            <span class="text-xs text-zinc-600">Tap the (+) icon top right to upload photos/videos!</span>
                        </div>
                    `;
                    return;
                }

                let html = '';
                querySnapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    let mediaContent = `<img src="${post.mediaUrl}" class="w-full object-cover max-h-[450px]" loading="lazy">`;
                    if (post.isVideo) {
                        mediaContent = `<video src="${post.mediaUrl}" controls class="w-full object-cover max-h-[450px]"></video>`;
                    }

                    html += `
                        <div class="bg-zinc-950 border border-zinc-900 rounded-2xl overflow-hidden shadow-lg">
                            <div class="flex items-center justify-between p-3">
                                <div class="flex items-center space-x-2.5">
                                    <img src="${post.avatar}" class="w-9 h-9 rounded-full bg-zinc-800 object-cover">
                                    <span class="font-bold text-sm text-white">${post.username}</span>
                                </div>
                            </div>
                            <div class="bg-black flex items-center justify-center">
                                ${mediaContent}
                            </div>
                            <div class="p-3 text-sm">
                                <p class="text-zinc-200"><strong class="text-white mr-2">${post.username}</strong>${post.caption || ''}</p>
                            </div>
                        </div>
                    `;
                });
                feedContainer.innerHTML = html;
            } catch (e) {
                console.error("Error loading posts feed:", e);
                document.getElementById('postsFeedContainer').innerHTML = `<div class="text-center text-red-500 text-sm py-6">Failed to load feed posts.</div>`;
            }
        }

        async function renderNotifications() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="p-4">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold text-yellow-400">Notifications</h2>
                        <button onclick="switchTab('home')" class="text-zinc-400 text-sm"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    </div>
                    <div id="notifList" class="space-y-3">
                        <div class="text-center text-zinc-500 text-sm py-10">Loading notifications...</div>
                    </div>
                </div>
            `;

            try {
                const q = window.query(
                    window.collection(window.db, "notifications"), 
                    window.where("receiverUid", "==", window.auth.currentUser.uid),
                    window.orderBy("timestamp", "desc")
                );
                const snapshot = await window.getDocs(q);

        async function sendPrivateMessage(chatId, peerUid, customText = null, audioUrl = null, mediaUrl = null, isVideo = false) {
            const input = document.getElementById('chatInput');
            const text = customText || (input ? input.value.trim() : '');
            if (!text && !audioUrl && !mediaUrl) return;
            
            if (!window.currentUserData && window.auth.currentUser) {
                await window.preloadUserData();
            }

            try {
                let msgData = {
                    sender: window.auth.currentUser.uid,
                    timestamp: window.serverTimestamp()
                };

                if(audioUrl) {
                    msgData.audioUrl = audioUrl;
                    msgData.text = "[Voice Note]";
                } else if(mediaUrl) {
                    msgData.mediaUrl = mediaUrl;
                    msgData.isVideo = isVideo;
                    msgData.text = isVideo ? "[Video]" : "[Photo]";
                } else {
                    msgData.text = text;
                }

                await window.addDoc(window.collection(window.db, "chats", chatId, "messages"), msgData);

                const senderUsername = window.currentUserData ? window.currentUserData.username : "Someone";
                let notifText = `sent you a message.`;
                if(audioUrl) notifText = `sent you a voice note.`;
                if(mediaUrl) notifText = isVideo ? `sent you a video.` : `sent you a photo.`;

                await window.addDoc(window.collection(window.db, "notifications"), {
                    receiverUid: peerUid,
                    senderUid: window.auth.currentUser.uid,
                    senderUsername: senderUsername,
                    type: 'message',
                    text: notifText,
                    timestamp: window.serverTimestamp()
                });

                if(input && !customText) input.value = '';
                loadPrivateMessages(chatId);
            } catch (e) {
                console.error("Error sending message: ", e);
            }
        }

        async function toggleVoiceRecord(chatId, peerUid) {
            const micBtn = document.getElementById('micBtn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = async () => {
                            const base64Audio = reader.result;
                            await sendPrivateMessage(chatId, peerUid, null, base64Audio);
                        };
                    };

                    mediaRecorder.start();
                    micBtn.classList.remove('bg-zinc-800', 'text-yellow-400');
                    micBtn.classList.add('bg-red-600', 'text-white', 'animate-pulse');
                } catch (e) {
                    alert("Microphone access denied or not supported.");
                }
            } else {
                mediaRecorder.stop();
                micBtn.classList.remove('bg-red-600', 'text-white', 'animate-pulse');
                micBtn.classList.add('bg-zinc-800', 'text-yellow-400');
            }
        }

        async function loadPrivateMessages(chatId) {
            const container = document.getElementById('messageContainer');
            try {
                const q = window.query(
                    window.collection(window.db, "chats", chatId, "messages"), 
                    window.orderBy("timestamp", "asc")
                );
                const snapshot = await window.getDocs(q);
                
                let html = '';
                let messageCount = 0;
                snapshot.forEach(docSnap => {
                    const msg = docSnap.data();
                    messageCount++;
                    const isMe = msg.sender === window.auth.currentUser.uid;
                    
                    let contentHtml = msg.text;
                    if(msg.audioUrl) {
                        contentHtml = `<audio controls class="h-8 max-w-[200px]"><source src="${msg.audioUrl}" type="audio/webm">Your browser does not support audio.</audio>`;
                    } else if(msg.mediaUrl) {
                        if(msg.isVideo) {
                            contentHtml = `<video src="${msg.mediaUrl}" controls class="max-w-full rounded-xl max-h-[250px] object-cover"></video>`;
                        } else {
                            contentHtml = `<img src="${msg.mediaUrl}" class="max-w-full rounded-xl max-h-[250px] object-cover">`;
                        }
                    }

                    html += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                            <div class="max-w-[70%] p-3 rounded-2xl text-sm ${isMe ? 'bg-yellow-400 text-black rounded-br-none' : 'bg-zinc-900 text-white border border-zinc-800 rounded-bl-none'}">
                                ${contentHtml}
                            </div>
                        </div>
                    `;
                });
                
                // Play notification sound if incoming message from another user
                if (!container.dataset.lastCount || parseInt(container.dataset.lastCount) < messageCount) {
                    if (snapshot.docs.length > 0) {
                        const lastMsg = snapshot.docs[snapshot.docs.length - 1].data();
                        if (lastMsg.sender !== window.auth.currentUser.uid) {
                            playNotificationSound();
                        }
                    }
                }
                container.dataset.lastCount = messageCount;

                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                console.error("Error loading messages:", e);
            }
        }

        async function saveProfileChanges() {
            if (!window.currentUserData && window.auth.currentUser) {
                await window.preloadUserData();
            }

            const newUsername = document.getElementById('editUsername').value.trim().toLowerCase();
            const newBio = document.getElementById('editBio').value.trim();
            const isPrivate = document.getElementById('settingPrivate').checked;
            const pushNotifications = document.getElementById('settingNotif').checked;

            if (!newUsername) {
                alert("Username cannot be empty!");
                return;
            }

            const saveBtn = document.getElementById('saveProfileBtn');
            if(saveBtn) {
                saveBtn.className = "w-full bg-zinc-800 text-zinc-500 py-2.5 rounded-xl font-bold text-sm transition shadow-none cursor-default";
                saveBtn.innerText = "Saved Successfully!";
            }

            try {
                if (window.currentUserData && window.currentUserData.username !== newUsername) {
                    const q = window.query(window.collection(window.db, "users"), window.where("username", "==", newUsername));
                    const querySnapshot = await window.getDocs(q);
                    if (!querySnapshot.empty) {
                        alert("Username is already taken by another user!");
                        if(saveBtn) {
                            saveBtn.className = "w-full bg-yellow-400 text-black py-2.5 rounded-xl font-bold text-sm transition shadow-md";
                            saveBtn.innerText = "Save";
                        }
                        return;
                    }
                }

                const userRef = window.doc(window.db, "users", window.auth.currentUser.uid);
                const updatedData = {
                    username: newUsername,
                    avatar: tempAvatarBase64 || (window.currentUserData ? window.currentUserData.avatar : ""),
                    bio: newBio,
                    isPrivate: isPrivate,
                    pushNotifications: pushNotifications
                };

                await window.updateDoc(userRef, updatedData);

                window.currentUserData = {
                    ...(window.currentUserData || {}),
                    ...updatedData
                };

                setTimeout(() => {
                    if(saveBtn) {
                        saveBtn.className = "w-full bg-yellow-400 text-black py-2.5 rounded-xl font-bold text-sm transition shadow-md";
                        saveBtn.innerText = "Save";
                    }
                }, 2000);

            } catch (e) {
                alert("Error updating profile: " + e.message);
                if(saveBtn) {
                    saveBtn.className = "w-full bg-yellow-400 text-black py-2.5 rounded-xl font-bold text-sm transition shadow-md";
                    saveBtn.innerText = "Save";
                }
            }
        }

        async function handleChangePassword() {
            const newPass = document.getElementById('newPasswordInput').value;
            if (!newPass || newPass.length < 6) {
                alert("Password must be at least 6 characters long!");
                return;
            }
            try {
                await window.updatePassword(window.auth.currentUser, newPass);
                alert("Password updated successfully!");
                document.getElementById('newPasswordInput').value = '';
            } catch (e) {
                alert("Error updating password: " + e.message + "\n(Note: You may need to re-login recently to update password)");
            }
        }

        async function handleLogout() {
            try {
                await window.signOut(window.auth);
                window.currentUserData = null;
            } catch (e) {
                alert("Logout Error: " + e.message);
            }
        }
    </script>
</body>
</html>
