<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roxchat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#eab308">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Roxchat">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#eab308', 600: '#ca8a04' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased min-h-screen flex flex-col">

    <div id="app" class="max-w-md mx-auto w-full bg-slate-900 min-h-screen flex flex-col shadow-2xl relative overflow-hidden border-x border-slate-800">
        
        <div id="auth-view" class="flex-1 flex flex-col justify-center p-6 hidden">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-amber-400 mb-2">Roxchat</h1>
                <p class="text-slate-400 text-sm">Connect, Share, and Chat with Friends</p>
            </div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Email Address</label>
                    <input type="email" id="login-email" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Password</label>
                    <input type="password" id="login-password" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500">
                </div>
                <button type="submit" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-semibold py-3 rounded-xl transition shadow-lg shadow-amber-500/20 active:opacity-50">Sign In</button>
                <p class="text-center text-sm text-slate-400 mt-4">
                    Don't have an account? <button type="button" id="show-register" class="text-amber-400 font-semibold hover:underline">Sign Up</button>
                </p>
            </form>

            <form id="register-form" class="space-y-4 hidden">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Username</label>
                    <input type="text" id="reg-username" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Email Address</label>
                    <input type="email" id="reg-email" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Password</label>
                    <input type="password" id="reg-password" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500">
                </div>
                <button type="submit" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-semibold py-3 rounded-xl transition shadow-lg shadow-amber-500/20 active:opacity-50">Create Account</button>
                <p class="text-center text-sm text-slate-400 mt-4">
                    Already have an account? <button type="button" id="show-login" class="text-amber-400 font-semibold hover:underline">Sign In</button>
                </p>
            </form>
        </div>

        <div id="main-view" class="flex-1 flex flex-col hidden">
            
            <header class="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-slate-900/95 backdrop-blur sticky top-0 z-20">
                <h1 class="text-xl font-bold text-amber-400">Roxchat</h1>
                <div class="flex items-center space-x-3">
                    <button id="like-notification-btn" class="text-slate-400 hover:text-amber-400 p-2 transition"><i class="fa-solid fa-heart text-xl"></i></button>
                    <button id="logout-btn-header" class="text-slate-400 hover:text-white p-2 hidden"><i class="fa-solid fa-right-from-bracket text-lg"></i></button>
                </div>
            </header>

            <main id="content-area" class="flex-1 overflow-y-auto pb-24">
                
                <div id="tab-feed" class="space-y-4 p-4">
                    <div class="flex space-x-3 overflow-x-auto pb-2 scrollbar-none">
                        <div class="flex flex-col items-center space-y-1 flex-shrink-0 cursor-pointer" id="add-story-btn">
                            <div class="w-16 h-16 rounded-full border-2 border-dashed border-amber-500 flex items-center justify-center bg-slate-800 text-amber-400">
                                <i class="fa-solid fa-plus text-xl"></i>
                            </div>
                            <span class="text-xs text-slate-400">Add Story</span>
                        </div>
                        <div id="stories-container" class="flex space-x-3"></div>
                    </div>

                    <div class="bg-slate-800/50 border border-slate-800 rounded-2xl p-4 shadow-sm">
                        <textarea id="post-text" placeholder="What's on your mind?" rows="2" class="w-full bg-transparent resize-none focus:outline-none text-sm placeholder-slate-500"></textarea>
                        <div id="post-media-preview" class="hidden relative mt-2 rounded-xl overflow-hidden max-h-48 bg-black"></div>
                        <div class="flex items-center justify-between border-t border-slate-700/50 pt-3 mt-3">
                            <label class="cursor-pointer text-amber-400 hover:text-amber-300 text-sm flex items-center space-x-1">
                                <i class="fa-solid fa-image"></i>
                                <span class="text-xs font-medium">Media</span>
                                <input type="file" id="post-media-input" accept="image/*,video/*" class="hidden">
                            </label>
                            <button id="create-post-btn" class="bg-amber-500 hover:bg-amber-400 px-4 py-1.5 rounded-xl text-xs font-semibold text-slate-950 transition active:opacity-50">Post</button>
                        </div>
                    </div>

                    <div id="posts-container" class="space-y-4"></div>
                </div>

                <div id="tab-explore" class="p-4 hidden">
                    <div class="relative mb-4">
                        <i class="fa-solid fa-search absolute left-3 top-3.5 text-slate-500 text-sm"></i>
                        <input type="text" id="search-users" placeholder="Search users..." class="w-full bg-slate-800 border border-slate-700 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-amber-500">
                    </div>
                    <div id="users-list" class="space-y-3"></div>
                </div>

                <div id="tab-messages" class="flex flex-col h-[calc(100vh-7.5rem)] hidden">
                    <div id="chats-list-view" class="p-4 space-y-3 flex-1 overflow-y-auto">
                        <h3 class="text-xs font-bold uppercase text-slate-500 tracking-wider mb-2">Friends & Chats</h3>
                        <div id="friends-chat-list" class="space-y-2"></div>
                    </div>
                    
                    <div id="active-chat-room" class="flex flex-col h-full hidden bg-slate-900 absolute inset-0 z-30">
                        <div class="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-slate-900">
                            <button id="close-chat" class="text-slate-400 hover:text-white"><i class="fa-solid fa-arrow-left text-lg"></i></button>
                            <span id="chat-room-title" class="font-bold text-sm"></span>
                            <div class="w-6"></div>
                        </div>
                        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-3"></div>
                        <div class="p-3 border-t border-slate-800 flex items-center space-x-2 bg-slate-900">
                            <input type="text" id="chat-input" placeholder="Type a message..." class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500">
                            <button id="send-audio-btn" class="text-slate-400 hover:text-amber-400 p-2"><i class="fa-solid fa-microphone text-lg"></i></button>
                            <button id="send-chat-btn" class="bg-amber-500 text-slate-950 px-4 py-2.5 rounded-xl text-sm font-semibold active:opacity-50"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>

                <div id="tab-profile" class="p-4 space-y-6 hidden">
                    <div class="flex flex-col items-center text-center space-y-2">
                        <div class="w-20 h-20 rounded-full bg-slate-800 border-2 border-amber-500 overflow-hidden flex items-center justify-center text-2xl font-bold text-amber-400 cursor-pointer relative shadow-lg" id="profile-avatar-container">
                            <span id="profile-initial">U</span>
                            <img id="profile-img-preview" class="absolute inset-0 w-full h-full object-cover hidden" alt="Profile">
                            <input type="file" id="profile-pic-input" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                        </div>
                        <p class="text-xs text-slate-400">Tap image to change photo</p>
                    </div>

                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Username</label>
                            <input type="text" id="profile-username-input" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Bio</label>
                            <textarea id="profile-bio-input" rows="2" placeholder="Roxchat..." class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500 resize-none"></textarea>
                        </div>
                        <button id="save-profile-btn" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-semibold py-3 rounded-xl transition shadow-lg shadow-amber-500/20 active:opacity-40">Save Changes</button>
                    </div>

                    <div class="pt-2">
                        <button id="logout-btn-profile" class="w-full bg-slate-800 hover:bg-slate-700 text-rose-400 font-semibold py-3 rounded-xl text-xs border border-slate-700 transition active:opacity-50">Log Out</button>
                    </div>
                </div>

            </main>

            <nav class="h-20 border-t border-slate-800 bg-slate-900/95 backdrop-blur flex items-center justify-around px-2 fixed bottom-0 max-w-md w-full z-20 pb-4">
                <button data-tab="feed" class="nav-btn text-amber-500 flex flex-col items-center space-y-1 p-2 active:scale-95 transition-transform"><i class="fa-solid fa-house text-2xl"></i></button>
                <button data-tab="explore" class="nav-btn text-slate-400 flex flex-col items-center space-y-1 p-2 active:scale-95 transition-transform"><i class="fa-solid fa-compass text-2xl"></i></button>
                <button data-tab="messages" class="nav-btn text-slate-400 flex flex-col items-center space-y-1 p-2 active:scale-95 transition-transform"><i class="fa-solid fa-comment-dots text-2xl"></i></button>
                <button data-tab="profile" class="nav-btn text-slate-400 flex flex-col items-center space-y-1 p-2 active:scale-95 transition-transform"><i class="fa-solid fa-user text-2xl"></i></button>
            </nav>

        </div>
    </div>

    <!-- Audio for Like Sound effect -->
    <audio id="like-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc, updateDoc, query, orderBy, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaqyhWJg8QmFzB4xKR5sJT8UetZEqZGrs",
            authDomain: "roxchat-529a0.firebaseapp.com",
            databaseURL: "https://roxchat-529a0-default-rtdb.firebaseio.com",
            projectId: "roxchat-529a0",
            storageBucket: "roxchat-529a0.firebasestorage.app",
            messagingSenderId: "711075232006",
            appId: "1:711075232006:web:0f52e8d2eb707573ae8687",
            measurementId: "G-1JCBDGNB45"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authView = document.getElementById('auth-view');
        const mainView = document.getElementById('main-view');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const showRegisterBtn = document.getElementById('show-register');
        const showLoginBtn = document.getElementById('show-login');
        const logoutBtnHeader = document.getElementById('logout-btn-header');
        const logoutBtnProfile = document.getElementById('logout-btn-profile');
        const likeSound = document.getElementById('like-sound');

        showRegisterBtn.addEventListener('click', () => { loginForm.classList.add('hidden'); registerForm.classList.remove('hidden'); });
        showLoginBtn.addEventListener('click', () => { registerForm.classList.add('hidden'); loginForm.classList.remove('hidden'); });

        // Zero-Delay Instant Tab Switching
        const navBtns = document.querySelectorAll('.nav-btn');
        navBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                navBtns.forEach(b => b.classList.replace('text-amber-500', 'text-slate-400'));
                btn.classList.replace('text-slate-400', 'text-amber-500');
                const tab = btn.getAttribute('data-tab');
                document.querySelectorAll('#content-area > div').forEach(d => d.classList.add('hidden'));
                document.getElementById(`tab-${tab}`).classList.remove('hidden');
            });
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                authView.classList.add('hidden');
                mainView.classList.remove('hidden');
                initApp(user);
            } else {
                mainView.classList.add('hidden');
                authView.classList.remove('hidden');
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const username = document.getElementById('reg-username').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", res.user.uid), { uid: res.user.uid, username, email, bio: "Roxchat.", profilePic: "", createdAt: serverTimestamp() });
            } catch (err) { alert(err.message); }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) { alert(err.message); }
        });

        const handleLogout = () => signOut(auth);
        logoutBtnHeader.addEventListener('click', handleLogout);
        logoutBtnProfile.addEventListener('click', handleLogout);

        function initApp(user) {
            loadUserProfile(user);
            loadPosts();
            loadExploreUsers();
        }

        async function loadUserProfile(user) {
            try {
                const userDocRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userDocRef);
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('profile-username-input').value = data.username || "";
                    document.getElementById('profile-bio-input').value = data.bio || "";
                    document.getElementById('profile-initial').textContent = (data.username || "U").charAt(0).toUpperCase();
                    if (data.profilePic) {
                        const imgPreview = document.getElementById('profile-img-preview');
                        imgPreview.src = data.profilePic;
                        imgPreview.classList.remove('hidden');
                    }
                }
            } catch (e) { console.error(e); }
        }

        document.getElementById('profile-pic-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async function(uploadEvent) {
                    const base64Img = uploadEvent.target.result;
                    const imgPreview = document.getElementById('profile-img-preview');
                    imgPreview.src = base64Img;
                    imgPreview.classList.remove('hidden');
                    if (auth.currentUser) {
                        try {
                            const userRef = doc(db, "users", auth.currentUser.uid);
                            await updateDoc(userRef, { profilePic: base64Img });
                        } catch (err) { console.error(err); }
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('save-profile-btn').addEventListener('click', async () => {
            if (!auth.currentUser) return;
            const newUsername = document.getElementById('profile-username-input').value;
            const newBio = document.getElementById('profile-bio-input').value;
            try {
                const userRef = doc(db, "users", auth.currentUser.uid);
                await updateDoc(userRef, { username: newUsername, bio: newBio });
                alert("Profile updated successfully!");
                document.getElementById('profile-initial').textContent = newUsername.charAt(0).toUpperCase();
            } catch (err) { alert(err.message); }
        });

        let currentMediaBase64 = null;
        document.getElementById('post-media-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(uploadEvent) {
                    currentMediaBase64 = uploadEvent.target.result;
                    const preview = document.getElementById('post-media-preview');
                    preview.innerHTML = file.type.startsWith('video') 
                        ? `<video src="${currentMediaBase64}" controls class="w-full h-40 object-cover"></video>`
                        : `<img src="${currentMediaBase64}" class="w-full h-40 object-cover">`;
                    preview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('create-post-btn').addEventListener('click', async () => {
            const text = document.getElementById('post-text').value;
            if (!text && !currentMediaBase64) return;
            try {
                await addDoc(collection(db, "posts"), {
                    uid: auth.currentUser.uid,
                    email: auth.currentUser.email,
                    text,
                    media: currentMediaBase64 || null,
                    likes: [],
                    comments: [],
                    createdAt: serverTimestamp()
                });
                document.getElementById('post-text').value = '';
                document.getElementById('post-media-preview').classList.add('hidden');
                currentMediaBase64 = null;
                loadPosts();
            } catch (err) { alert(err.message); }
        });

        function timeAgo(timestamp) {
            if (!timestamp) return "Just now";
            const now = new Date();
            const postDate = timestamp.toDate();
            const seconds = Math.floor((now - postDate) / 1000);
            if (seconds < 60) return "Just now";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }

        async function loadPosts() {
            const container = document.getElementById('posts-container');
            container.innerHTML = '<p class="text-center text-xs text-slate-500">Loading posts...</p>';
            try {
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                container.innerHTML = '';
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<p class="text-center text-xs text-slate-500">No posts available yet.</p>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    const postId = docSnap.id;
                    const likesCount = post.likes ? post.likes.length : 0;
                    const isLiked = post.likes && auth.currentUser && post.likes.includes(auth.currentUser.uid);
                    const comments = post.comments || [];
                    const timeString = timeAgo(post.createdAt);

                    const div = document.createElement('div');
                    div.className = "bg-slate-800/40 border border-slate-800 rounded-2xl p-4 space-y-3";
                    div.innerHTML = `
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-2">
                                <div class="w-8 h-8 rounded-full bg-amber-500 text-slate-950 flex items-center justify-center font-bold text-xs">${post.email.charAt(0).toUpperCase()}</div>
                                <span class="text-xs font-semibold text-slate-300">${post.email}</span>
                            </div>
                            <span class="text-[10px] text-slate-500">${timeString}</span>
                        </div>
                        ${post.text ? `<p class="text-sm text-slate-200">${post.text}</p>` : ''}
                        ${post.media ? (post.media.startsWith('data:video') ? `<video src="${post.media}" controls class="w-full rounded-xl max-h-60 object-cover"></video>` : `<img src="${post.media}" class="w-full rounded-xl max-h-60 object-cover">`) : ''}
                        
                        <div class="flex items-center justify-between pt-2 border-t border-slate-700/40 text-slate-400">
                            <div class="flex items-center space-x-4">
                                <button onclick="toggleLike('${postId}', ${isLiked})" class="flex items-center space-x-1.5 text-xs font-semibold ${isLiked ? 'text-rose-500' : 'hover:text-rose-500'} transition">
                                    <i class="${isLiked ? 'fa-solid' : 'fa-regular'} fa-heart text-lg"></i>
                                    <span>${likesCount}</span>
                                </button>
                                <button onclick="toggleCommentsSection('${postId}')" class="flex items-center space-x-1.5 text-xs font-semibold hover:text-amber-400 transition">
                                    <i class="fa-regular fa-comment text-lg"></i>
                                    <span>${comments.length}</span>
                                </button>
                                <button onclick="sharePost('${post.text || 'Check out this post on Roxchat!'}')" class="hover:text-amber-400 transition">
                                    <i class="fa-regular fa-share-from-square text-lg"></i>
                                </button>
                            </div>
                        </div>

                        <div id="comments-section-${postId}" class="hidden space-y-2 pt-2 border-t border-slate-700/20">
                            <div class="space-y-1 max-h-32 overflow-y-auto text-xs" id="comments-list-${postId}">
                                ${comments.map(c => `<div class="bg-slate-900/50 p-2 rounded-lg"><span class="font-bold text-amber-400">${c.user}:</span> ${c.text}</div>`).join('')}
                            </div>
                            <div class="flex space-x-2 mt-2">
                                <input type="text" id="comment-input-${postId}" placeholder="Add a comment..." class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:border-amber-500">
                                <button onclick="addComment('${postId}')" class="bg-amber-500 text-slate-950 px-3 py-1.5 rounded-lg text-xs font-semibold">Post</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (err) { 
                console.error(err);
                container.innerHTML = '<p class="text-center text-xs text-red-500">Failed to load posts.</p>'; 
            }
        }

        window.toggleLike = async function(postId, isLiked) {
            if (!auth.currentUser) return;
            try {
                const postRef = doc(db, "posts", postId);
                if (isLiked) {
                    await updateDoc(postRef, { likes: arrayRemove(auth.currentUser.uid) });
                } else {
                    await updateDoc(postRef, { likes: arrayUnion(auth.currentUser.uid) });
                    try {
                        likeSound.currentTime = 0;
                        likeSound.play();
                    } catch(e) {}
                }
                loadPosts();
            } catch (err) { console.error(err); }
        }

        window.toggleCommentsSection = function(postId) {
            const section = document.getElementById(`comments-section-${postId}`);
            section.classList.toggle('hidden');
        }

        window.addComment = async function(postId) {
            if (!auth.currentUser) return;
            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();
            if (!text) return;
            try {
                const postRef = doc(db, "posts", postId);
                const commentObj = { user: auth.currentUser.email.split('@')[0], text, createdAt: new Date().toISOString() };
                await updateDoc(postRef, { comments: arrayUnion(commentObj) });
                input.value = '';
                loadPosts();
            } catch (err) { alert(err.message); }
        }

        window.sharePost = function(text) {
            if (navigator.share) {
                navigator.share({ title: 'Roxchat Post', text: text }).catch(() => {});
            } else {
                navigator.clipboard.writeText(text);
                alert("Post content copied to clipboard!");
            }
        }

        async function loadExploreUsers() {
            const list = document.getElementById('users-list');
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                list.innerHTML = '';
                querySnapshot.forEach((docSnap) => {
                    const u = docSnap.data();
                    if(u.uid === auth.currentUser?.uid) return;
                    const div = document.createElement('div');
                    div.className = "flex items-center justify-between bg-slate-800/50 p-3 rounded-xl border border-slate-800";
                    div.innerHTML = `
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full bg-amber-500 text-slate-950 flex items-center justify-center font-bold text-sm">${u.username.charAt(0).toUpperCase()}</div>
                            <div>
                                <h4 class="text-sm font-semibold">${u.username}</h4>
                                <p class="text-xs text-slate-400">${u.email}</p>
                            </div>
                        </div>
                        <button onclick="startChat('${u.uid}', '${u.username}')" class="bg-amber-500/20 text-amber-400 px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-amber-500 hover:text-slate-950 transition active:opacity-50">Chat</button>
                    `;
                    list.appendChild(div);
                });
            } catch (err) { console.error(err); }
        }

        window.startChat = function(uid, username) {
            document.getElementById('chats-list-view').classList.add('hidden');
            const room = document.getElementById('active-chat-room');
            room.classList.remove('hidden');
            document.getElementById('chat-room-title').textContent = username;
        }

        document.getElementById('close-chat').addEventListener('click', () => {
            document.getElementById('active-chat-room').classList.add('hidden');
            document.getElementById('chats-list-view').classList.remove('hidden');
        });
    </script>
</body>
</html>
