<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roxchat</title>
    <!-- PWABuilder Manifest & Meta Tags with Custom Icon support -->
    <meta name="description" content="Roxchat App">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Roxchat%22%2C%22short_name%22%3A%22Roxchat%22%2C%22description%22%3A%22Instagram%20clone%20with%20Firebase%22%2C%22start_url%22%3A%22%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22YOUR_LOGO_IMAGE_URL_HERE%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2png%22%7D%5D%7D">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-black text-white font-sans antialiased selection:bg-pink-500 selection:text-white">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col justify-between pb-16 relative">
        <!-- Dynamic App Container -->
    </div>

    <!-- Instagram Style Bottom Navigation Bar -->
    <nav id="bottomNav" class="hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-black border-t border-zinc-900 flex justify-around py-3 z-50">
        <button onclick="switchTab('home')" class="text-white text-xl"><i class="fa-solid fa-house"></i></button>
        <button onclick="switchTab('explore')" class="text-zinc-400 text-xl"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button onclick="switchTab('reels')" class="text-zinc-400 text-xl"><i class="fa-solid fa-clapperboard"></i></button>
        <button onclick="switchTab('chat')" class="text-zinc-400 text-xl"><i class="fa-solid fa-comment-dots"></i></button>
        <button onclick="switchTab('profile')" class="text-zinc-400 text-xl"><i class="fa-solid fa-user"></i></button>
    </nav>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD...",
            authDomain: "roxchat-529a0.firebaseapp.com",
            projectId: "roxchat-529a0",
            storageBucket: "roxchat-529a0.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.auth = auth;
        window.db = db;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.signOut = signOut;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.collection = collection;
        window.query = query;
        window.orderBy = orderBy;
        window.serverTimestamp = serverTimestamp;
        window.doc = doc;
        window.setDoc = setDoc;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('bottomNav').classList.remove('hidden');
                switchTab('home');
            } else {
                document.getElementById('bottomNav').classList.add('hidden');
                renderLogin();
            }
        });
    </script>

    <script>
        let currentTab = 'home';
        let mediaRecorder;
        let audioChunks = [];
        let recordedAudioBlob = null;

        function switchTab(tab) {
            currentTab = tab;
            if (tab === 'home') renderHome();
            else if (tab === 'explore') renderExplore();
            else if (tab === 'reels') renderReels();
            else if (tab === 'chat') renderChat();
            else if (tab === 'profile') renderProfile();
        }

        function renderLogin(isSignup = false) {
            document.getElementById('app').innerHTML = `
                <div class="p-8 flex flex-col justify-center min-h-screen">
                    <div class="text-center mb-8">
                        <h1 class="text-4xl font-serif italic tracking-wider font-bold bg-gradient-to-r from-purple-500 via-pink-500 to-yellow-500 bg-clip-text text-transparent">Roxchat</h1>
                    </div>
                    <div class="space-y-3">
                        <input type="email" id="email" placeholder="Phone number, username, or email" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-md text-sm text-white focus:outline-none focus:border-zinc-600">
                        <input type="password" id="password" placeholder="Password" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-md text-sm text-white focus:outline-none focus:border-zinc-600">
                        <button onclick="${isSignup ? 'handleSignup()' : 'handleLogin()'}" class="w-full bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-md font-semibold text-sm transition">${isSignup ? 'Sign Up' : 'Log In'}</button>
                    </div>
                    <div class="mt-6 text-center">
                        <p class="text-xs text-zinc-400 cursor-pointer" onclick="renderLogin(${!isSignup})">
                            ${isSignup ? 'Have an account? <span class="text-blue-400 font-semibold">Log in</span>' : "Don't have an account? <span class="text-blue-400 font-semibold">Sign up</span>"}
                        </p>
                    </div>
                </div>
            `;
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await window.signInWithEmailAndPassword(window.auth, email, password);
            } catch (error) {
                alert("Login Error: " + error.message);
            }
        }

        async function handleSignup() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await window.createUserWithEmailAndPassword(window.auth, email, password);
                await window.setDoc(window.doc(window.db, "users", res.user.uid), { email: email, bio: "Digital creator ✨" });
            } catch (error) {
                alert("Signup Error: " + error.message);
            }
        }

        function renderHome() {
            document.getElementById('app').innerHTML = `
                <div class="pb-20">
                    <div class="flex justify-between items-center px-4 py-3 border-b border-zinc-900 sticky top-0 bg-black z-40">
                        <h1 class="text-2xl font-serif italic font-bold tracking-wide">Roxchat</h1>
                        <div class="flex gap-5 text-xl">
                            <i class="fa-regular fa-heart cursor-pointer"></i>
                            <i class="fa-regular fa-paper-plane cursor-pointer" onclick="switchTab('chat')"></i>
                        </div>
                    </div>
                    <div class="flex gap-3 px-4 py-3 overflow-x-auto border-b border-zinc-900 no-scrollbar">
                        <div class="flex flex-col items-center flex-shrink-0 cursor-pointer" onclick="createStory()">
                            <div class="w-16 h-16 rounded-full border-2 border-dashed border-zinc-600 flex items-center justify-center text-lg bg-zinc-900">+</div>
                            <span class="text-[11px] mt-1 text-zinc-400">Your Story</span>
                        </div>
                        <div id="storiesList" class="flex gap-3"></div>
                    </div>
                    <div class="p-4 border-b border-zinc-900 bg-zinc-950">
                        <textarea id="postText" placeholder="What's on your mind?" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg text-white text-sm mb-3 resize-none focus:outline-none"></textarea>
                        <input type="text" id="postImgUrl" placeholder="Image URL (Optional)" class="w-full bg-zinc-900 border border-zinc-800 p-2.5 rounded-lg text-white text-xs mb-3 focus:outline-none">
                        <button onclick="sharePost()" class="w-full bg-blue-500 hover:bg-blue-600 py-2.5 rounded-lg font-semibold text-sm transition">Share Post</button>
                    </div>
                    <div id="postsFeed" class="divide-y divide-zinc-900">
                        <div class="text-center py-8 text-zinc-500 text-sm">Loading feed...</div>
                    </div>
                </div>
            `;
            loadPosts();
            loadStories();
        }

        async function sharePost() {
            const text = document.getElementById('postText').value;
            const image = document.getElementById('postImgUrl').value;
            if (!text && !image) return alert("Please add text or image!");

            await window.addDoc(window.collection(window.db, "posts"), {
                text, image, email: window.auth.currentUser.email, createdAt: window.serverTimestamp()
            });
            renderHome();
        }

        async function loadPosts() {
            const feed = document.getElementById('postsFeed');
            const q = window.query(window.collection(window.db, "posts"), window.orderBy("createdAt", "desc"));
            const querySnapshot = await window.getDocs(q);
            let html = "";
            querySnapshot.forEach((doc) => {
                const p = doc.data();
                html += `
                    <div class="py-3">
                        <div class="flex items-center px-4 py-2 gap-2">
                            <div class="w-8 h-8 bg-gradient-to-tr from-yellow-500 via-pink-500 to-purple-600 rounded-full flex items-center justify-center font-bold text-xs">${p.email[0].toUpperCase()}</div>
                            <span class="text-xs font-semibold">${p.email.split('@')[0]}</span>
                        </div>
                        ${p.image ? `<img src="${p.image}" class="w-full max-h-96 object-cover mb-2">` : ''}
                        ${p.text ? `<p class="px-4 text-sm mb-2 text-zinc-200">${p.text}</p>` : ''}
                        <div class="flex px-4 gap-4 text-xl mt-2 text-zinc-300">
                            <i class="fa-regular fa-heart hover:text-red-500 cursor-pointer"></i>
                            <i class="fa-regular fa-comment cursor-pointer"></i>
                            <i class="fa-regular fa-paper-plane cursor-pointer"></i>
                        </div>
                    </div>
                `;
            });
            feed.innerHTML = html || "<p class='text-center text-zinc-500 py-8'>No posts yet</p>";
        }

        async function createStory() {
            const imgUrl = prompt("Enter Image URL for your Story:");
            if (imgUrl) {
                await window.addDoc(window.collection(window.db, "stories"), {
                    image: imgUrl, email: window.auth.currentUser.email, createdAt: window.serverTimestamp()
                });
                loadStories();
            }
        }

        async function loadStories() {
            const list = document.getElementById('storiesList');
            const q = window.query(window.collection(window.db, "stories"), window.orderBy("createdAt", "desc"));
            const snapshot = await window.getDocs(q);
            let html = "";
            snapshot.forEach(doc => {
                const s = doc.data();
                html += `
                    <div class="flex flex-col items-center flex-shrink-0 cursor-pointer">
                        <div class="w-16 h-16 rounded-full p-[2px] bg-gradient-to-tr from-yellow-500 via-pink-500 to-purple-600">
                            <img src="${s.image}" class="w-full h-full rounded-full object-cover border-2 border-black">
                        </div>
                        <span class="text-[11px] mt-1 text-zinc-300 truncate w-16 text-center">${s.email.split('@')[0]}</span>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        function renderExplore() {
            document.getElementById('app').innerHTML = `
                <div class="p-4 pb-20">
                    <div class="mb-4">
                        <input type="text" placeholder="Search" class="w-full bg-zinc-900 border border-zinc-800 px-3 py-2 rounded-lg text-sm text-white focus:outline-none">
                    </div>
                    <div class="grid grid-cols-3 gap-1">
                        <div class="bg-zinc-900 h-32 flex items-center justify-center text-xs text-zinc-600">Explore</div>
                        <div class="bg-zinc-900 h-32 flex items-center justify-center text-xs text-zinc-600">Explore</div>
                        <div class="bg-zinc-900 h-32 flex items-center justify-center text-xs text-zinc-600">Explore</div>
                    </div>
                </div>
            `;
        }

        function renderReels() {
            document.getElementById('app').innerHTML = `
                <div class="h-screen flex flex-col items-center justify-center bg-black text-center p-4 pb-20">
                    <i class="fa-solid fa-clapperboard text-5xl mb-3 text-zinc-700"></i>
                    <p class="font-bold text-lg">Reels Section</p>
                    <p class="text-xs text-zinc-500 mt-1">Scroll through vertical video feeds.</p>
                </div>
            `;
        }

        function renderChat() {
            document.getElementById('app').innerHTML = `
                <div class="p-4 pb-20 flex flex-col h-screen">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-arrow-left text-lg cursor-pointer" onclick="switchTab('home')"></i>
                            <h2 class="font-bold text-lg">${window.auth.currentUser?.email.split('@')[0]}</h2>
                        </div>
                        <i class="fa-regular fa-pen-to-square text-xl"></i>
                    </div>
                    <div id="chatMessages" class="flex-1 overflow-y-auto space-y-3 mb-4 pr-1">
                        <div class="text-center text-zinc-500 text-xs py-2">Direct Message Inbox</div>
                    </div>
                    <div class="sticky bottom-16 bg-black pt-2 pb-2 border-t border-zinc-900 flex items-center gap-2">
                        <input type="text" id="chatInput" placeholder="Message..." class="flex-1 bg-zinc-900 border border-zinc-800 px-4 py-2.5 rounded-full text-sm text-white focus:outline-none">
                        <button id="recordBtn" onclick="toggleInboxRecord()" class="bg-zinc-900 border border-zinc-800 w-10 h-10 rounded-full flex items-center justify-center text-red-500 hover:bg-zinc-800">
                            <i class="fa-solid fa-microphone"></i>
                        </button>
                        <button onclick="sendChatMessage()" class="bg-blue-500 text-white px-4 py-2 rounded-full text-sm font-semibold">Send</button>
                    </div>
                </div>
            `;
            loadChatMessages();
        }

        async function toggleInboxRecord() {
            const recordBtn = document.getElementById('recordBtn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                audioChunks = [];
                let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => { 
                    recordedAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const audioBase64 = await blobToBase64(recordedAudioBlob);
                    await window.addDoc(window.collection(window.db, "chats"), {
                        audio: audioBase64, email: window.auth.currentUser.email, createdAt: window.serverTimestamp()
                    });
                    recordedAudioBlob = null;
                    loadChatMessages();
                };
                mediaRecorder.start();
                recordBtn.classList.add("bg-red-900", "border-red-500");
            } else {
                mediaRecorder.stop();
                recordBtn.classList.remove("bg-red-900", "border-red-500");
            }
        }

        async function sendChatMessage() {
            const text = document.getElementById('chatInput.value');
            if (!text) return;

            await window.addDoc(window.collection(window.db, "chats"), {
                text, email: window.auth.currentUser.email, createdAt: window.serverTimestamp()
            });
            document.getElementById('chatInput').value = '';
            loadChatMessages();
        }

        async function loadChatMessages() {
            const chatBox = document.getElementById('chatMessages');
            if (!chatBox) return;
            const q = window.query(window.collection(window.db, "chats"), window.orderBy("createdAt", "asc"));
            const snapshot = await window.getDocs(q);
            let html = "";
            snapshot.forEach(doc => {
                const c = doc.data();
                const isMe = c.email === window.auth.currentUser.email;
                html += `
                    <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                        <span class="text-[10px] text-zinc-500 mb-1">${c.email.split('@')[0]}</span>
                        <div class="max-w-[75%] bg-zinc-900 p-3 rounded-2xl border border-zinc-800 text-sm">
                            ${c.text ? `<p>${c.text}</p>` : ''}
                            ${c.audio ? `<audio controls class="w-full h-8 mt-1"><source src="${c.audio}" type="audio/webm"></audio>` : ''}
                        </div>
                    </div>
                `;
            });
            chatBox.innerHTML = html || "<p class='text-center text-zinc-600 text-xs'>No messages yet.</p>";
        }

        function blobToBase64(blob) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        }

        function renderProfile() {
            document.getElementById('app').innerHTML = `
                <div class="p-4 pb-20">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-bold text-lg truncate">${window.auth.currentUser?.email.split('@')[0]}</h2>
                        <button onclick="window.signOut(window.auth)" class="text-red-500 text-xs font-semibold border border-red-500/30 px-3 py-1.5 rounded-md">Log Out</button>
                    </div>
                    <div class="flex items-center gap-6 mb-4">
                        <div class="w-20 h-20 bg-zinc-800 rounded-full flex items-center justify-center text-2xl font-bold">${window.auth.currentUser?.email[0].toUpperCase()}</div>
                        <div class="flex gap-6 text-center flex-1 justify-around">
                            <div><p class="font-bold">1</p><p class="text-xs text-zinc-400">Posts</p></div>
                            <div><p class="font-bold">150</p><p class="text-xs text-zinc-400">Followers</p></div>
                            <div><p class="font-bold">90</p><p class="text-xs text-zinc-400">Following</p></div>
                        </div>
                    </div>
                    <div class="mb-6">
                        <p class="text-xs font-semibold">${window.auth.currentUser?.email}</p>
                        <p class="text-xs text-zinc-400 mt-1">Digital creator ✨</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
