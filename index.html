<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roxchat</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#6366f1', 600: '#4f46e5' }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased min-h-screen flex flex-col">

    <!-- App Container -->
    <div id="app" class="max-w-md mx-auto w-full bg-slate-900 min-h-screen flex flex-col shadow-2xl relative overflow-hidden border-x border-slate-800">
        
        <!-- Authentication View -->
        <div id="auth-view" class="flex-1 flex flex-col justify-center p-6 hidden">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500 mb-2">Roxchat</h1>
                <p class="text-slate-400 text-sm">Connect, Share, and Chat with Friends</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Email Address</label>
                    <input type="email" id="login-email" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Password</label>
                    <input type="password" id="login-password" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl transition shadow-lg shadow-indigo-600/30">Sign In</button>
                <p class="text-center text-sm text-slate-400 mt-4">
                    Don't have an account? <button type="button" id="show-register" class="text-indigo-400 font-semibold hover:underline">Sign Up</button>
                </p>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="space-y-4 hidden">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Username</label>
                    <input type="text" id="reg-username" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Email Address</label>
                    <input type="email" id="reg-email" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Password</label>
                    <input type="password" id="reg-password" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl transition shadow-lg shadow-indigo-600/30">Create Account</button>
                <p class="text-center text-sm text-slate-400 mt-4">
                    Already have an account? <button type="button" id="show-login" class="text-indigo-400 font-semibold hover:underline">Sign In</button>
                </p>
            </form>
        </div>

        <!-- Main App View -->
        <div id="main-view" class="flex-1 flex flex-col hidden">
            
            <!-- Top Header -->
            <header class="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-slate-900/80 backdrop-blur sticky top-0 z-20">
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">Roxchat</h1>
                <div class="flex items-center space-x-3">
                    <button id="logout-btn" class="text-slate-400 hover:text-white p-2"><i class="fa-solid fa-right-from-bracket text-lg"></i></button>
                </div>
            </header>

            <!-- Dynamic Content Area -->
            <main id="content-area" class="flex-1 overflow-y-auto pb-20">
                
                <!-- Feed Tab -->
                <div id="tab-feed" class="space-y-4 p-4">
                    <!-- Stories Bar -->
                    <div class="flex space-x-3 overflow-x-auto pb-2 scrollbar-none">
                        <div class="flex flex-col items-center space-y-1 flex-shrink-0 cursor-pointer" id="add-story-btn">
                            <div class="w-16 h-16 rounded-full border-2 border-dashed border-indigo-500 flex items-center justify-center bg-slate-800 text-indigo-400">
                                <i class="fa-solid fa-plus text-xl"></i>
                            </div>
                            <span class="text-xs text-slate-400">Add Story</span>
                        </div>
                        <div id="stories-container" class="flex space-x-3"></div>
                    </div>

                    <!-- Create Post Box -->
                    <div class="bg-slate-800/50 border border-slate-800 rounded-2xl p-4 shadow-sm">
                        <textarea id="post-text" placeholder="What's on your mind?" rows="2" class="w-full bg-transparent resize-none focus:outline-none text-sm placeholder-slate-500"></textarea>
                        <div id="post-media-preview" class="hidden relative mt-2 rounded-xl overflow-hidden max-h-48 bg-black"></div>
                        <div class="flex items-center justify-between border-t border-slate-700/50 pt-3 mt-3">
                            <label class="cursor-pointer text-indigo-400 hover:text-indigo-300 text-sm flex items-center space-x-1">
                                <i class="fa-solid fa-image"></i>
                                <span class="text-xs font-medium">Media</span>
                                <input type="file" id="post-media-input" accept="image/*,video/*" class="hidden">
                            </label>
                            <button id="create-post-btn" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-1.5 rounded-xl text-xs font-semibold text-white transition active:opacity-50">Post</button>
                        </div>
                    </div>

                    <!-- Posts Feed Container -->
                    <div id="posts-container" class="space-y-4"></div>
                </div>

                <!-- Explore Tab -->
                <div id="tab-explore" class="p-4 hidden">
                    <div class="relative mb-4">
                        <i class="fa-solid fa-search absolute left-3 top-3.5 text-slate-500 text-sm"></i>
                        <input type="text" id="search-users" placeholder="Search users..." class="w-full bg-slate-800 border border-slate-700 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
                    </div>
                    <div id="users-list" class="space-y-3"></div>
                </div>

                <!-- Messages Tab -->
                <div id="tab-messages" class="flex flex-col h-[calc(100vh-7.5rem)] hidden">
                    <div id="chats-list-view" class="p-4 space-y-3 flex-1 overflow-y-auto">
                        <h3 class="text-xs font-bold uppercase text-slate-500 tracking-wider mb-2">Friends & Chats</h3>
                        <div id="friends-chat-list" class="space-y-2"></div>
                    </div>
                    
                    <!-- Active Chat Room -->
                    <div id="active-chat-room" class="flex flex-col h-full hidden bg-slate-900 absolute inset-0 z-30">
                        <div class="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-slate-900">
                            <button id="close-chat" class="text-slate-400 hover:text-white"><i class="fa-solid fa-arrow-left text-lg"></i></button>
                            <span id="chat-room-title" class="font-bold text-sm"></span>
                            <div class="w-6"></div>
                        </div>
                        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-3"></div>
                        <div class="p-3 border-t border-slate-800 flex items-center space-x-2 bg-slate-900">
                            <input type="text" id="chat-input" placeholder="Type a message..." class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
                            <button id="send-audio-btn" class="text-slate-400 hover:text-indigo-400 p-2"><i class="fa-solid fa-microphone text-lg"></i></button>
                            <button id="send-chat-btn" class="bg-indigo-600 text-white px-4 py-2.5 rounded-xl text-sm font-semibold active:opacity-50"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>

                <!-- Profile Tab -->
                <div id="tab-profile" class="p-4 space-y-6 hidden">
                    <div class="flex flex-col items-center text-center space-y-3">
                        <div class="w-20 h-20 rounded-full bg-slate-800 border-2 border-indigo-500 overflow-hidden flex items-center justify-center text-2xl font-bold text-indigo-400" id="profile-avatar-container">
                            <span id="profile-initial">U</span>
                        </div>
                        <div>
                            <h2 id="profile-username" class="text-lg font-bold">Username</h2>
                            <p id="profile-email" class="text-xs text-slate-400">email@example.com</p>
                        </div>
                    </div>

                    <!-- Change Password Section -->
                    <div class="bg-slate-800/40 border border-slate-800 rounded-2xl p-4 space-y-3">
                        <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider">Change Password</h3>
                        <div>
                            <label class="block text-[11px] font-semibold text-slate-500 uppercase mb-1">New Password</label>
                            <input type="password" id="new-password-input" placeholder="Enter new password" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
                        </div>
                        <!-- Button with active:opacity-50 for dim effect when clicked -->
                        <button id="save-password-btn" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-semibold py-2 rounded-xl text-xs transition active:opacity-50">Save</button>
                    </div>

                    <div class="border-t border-slate-800 pt-4">
                        <h3 class="text-xs font-bold uppercase text-slate-500 tracking-wider mb-3">My Posts</h3>
                        <div id="user-posts-container" class="space-y-4"></div>
                    </div>
                </div>

            </main>

            <!-- Bottom Navigation Bar -->
            <nav class="h-16 border-t border-slate-800 bg-slate-900/90 backdrop-blur flex items-center justify-around px-2 fixed bottom-0 max-w-md w-full z-20">
                <button data-tab="feed" class="nav-btn text-indigo-500 flex flex-col items-center space-y-1"><i class="fa-solid fa-house text-lg"></i><span class="text-[10px] font-medium">Home</span></button>
                <button data-tab="explore" class="nav-btn text-slate-400 flex flex-col items-center space-y-1"><i class="fa-solid fa-compass text-lg"></i><span class="text-[10px] font-medium">Explore</span></button>
                <button data-tab="messages" class="nav-btn text-slate-400 flex flex-col items-center space-y-1"><i class="fa-solid fa-comment-dots text-lg"></i><span class="text-[10px] font-medium">Messages</span></button>
                <button data-tab="profile" class="nav-btn text-slate-400 flex flex-col items-center space-y-1"><i class="fa-solid fa-user text-lg"></i><span class="text-[10px] font-medium">Profile</span></button>
            </nav>

        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updatePassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, setDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM Elements
        const authView = document.getElementById('auth-view');
        const mainView = document.getElementById('main-view');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const showRegisterBtn = document.getElementById('show-register');
        const showLoginBtn = document.getElementById('show-login');
        const logoutBtn = document.getElementById('logout-btn');

        showRegisterBtn.addEventListener('click', () => { loginForm.classList.add('hidden'); registerForm.classList.remove('hidden'); });
        showLoginBtn.addEventListener('click', () => { registerForm.classList.add('hidden'); loginForm.classList.remove('hidden'); });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authView.classList.add('hidden');
                mainView.classList.remove('hidden');
                initApp(user);
            } else {
                mainView.classList.add('hidden');
                authView.classList.remove('hidden');
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const username = document.getElementById('reg-username').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", res.user.uid), { uid: res.user.uid, username, email, createdAt: serverTimestamp() });
            } catch (err) { alert(err.message); }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) { alert(err.message); }
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

        // Change Password Handler (Without success alert popup)
        document.getElementById('save-password-btn').addEventListener('click', async () => {
            const newPassword = document.getElementById('new-password-input').value;
            if (!newPassword) {
                return;
            }
            const user = auth.currentUser;
            if (user) {
                try {
                    await updatePassword(user, newPassword);
                    document.getElementById('new-password-input').value = '';
                } catch (err) {
                    console.error(err.message);
                }
            }
        });

        // Tab Navigation Logic
        const navBtns = document.querySelectorAll('.nav-btn');
        navBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                navBtns.forEach(b => b.classList.replace('text-indigo-500', 'text-slate-400'));
                btn.classList.replace('text-slate-400', 'text-indigo-500');
                const tab = btn.getAttribute('data-tab');
                document.querySelectorAll('#content-area > div').forEach(d => d.classList.add('hidden'));
                document.getElementById(`tab-${tab}`).classList.remove('hidden');
            });
        });

        function initApp(user) {
            document.getElementById('profile-email').textContent = user.email;
            document.getElementById('profile-initial').textContent = user.email.charAt(0).toUpperCase();
            loadPosts();
            loadExploreUsers();
        }

        let currentMediaBase64 = null;
        document.getElementById('post-media-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(uploadEvent) {
                    currentMediaBase64 = uploadEvent.target.result;
                    const preview = document.getElementById('post-media-preview');
                    preview.innerHTML = file.type.startsWith('video') 
                        ? `<video src="${currentMediaBase64}" controls class="w-full h-40 object-cover"></video>`
                        : `<img src="${currentMediaBase64}" class="w-full h-40 object-cover">`;
                    preview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('create-post-btn').addEventListener('click', async () => {
            const text = document.getElementById('post-text').value;
            if (!text && !currentMediaBase64) return;
            try {
                await addDoc(collection(db, "posts"), {
                    uid: auth.currentUser.uid,
                    email: auth.currentUser.email,
                    text,
                    media: currentMediaBase64 || null,
                    createdAt: serverTimestamp()
                });
                document.getElementById('post-text').value = '';
                document.getElementById('post-media-preview').classList.add('hidden');
                currentMediaBase64 = null;
                loadPosts();
            } catch (err) { alert(err.message); }
        });

        async function loadPosts() {
            const container = document.getElementById('posts-container');
            container.innerHTML = '<p class="text-center text-xs text-slate-500">Loading posts...</p>';
            try {
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                container.innerHTML = '';
                querySnapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    const div = document.createElement('div');
                    div.className = "bg-slate-800/40 border border-slate-800 rounded-2xl p-4 space-y-3";
                    div.innerHTML = `
                        <div class="flex items-center space-x-2">
                            <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-xs">${post.email.charAt(0).toUpperCase()}</div>
                            <span class="text-xs font-semibold text-slate-300">${post.email}</span>
                        </div>
                        ${post.text ? `<p class="text-sm text-slate-200">${post.text}</p>` : ''}
                        ${post.media ? (post.media.startsWith('data:video') ? `<video src="${post.media}" controls class="w-full rounded-xl max-h-60 object-cover"></video>` : `<img src="${post.media}" class="w-full rounded-xl max-h-60 object-cover">`) : ''}
                    `;
                    container.appendChild(div);
                });
            } catch (err) { container.innerHTML = '<p class="text-center text-xs text-red-500">Failed to load posts.</p>'; }
        }

        async function loadExploreUsers() {
            const list = document.getElementById('users-list');
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                list.innerHTML = '';
                querySnapshot.forEach((docSnap) => {
                    const u = docSnap.data();
                    if(u.uid === auth.currentUser?.uid) return;
                    const div = document.createElement('div');
                    div.className = "flex items-center justify-between bg-slate-800/50 p-3 rounded-xl border border-slate-800";
                    div.innerHTML = `
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-sm">${u.username.charAt(0).toUpperCase()}</div>
                            <div>
                                <h4 class="text-sm font-semibold">${u.username}</h4>
                                <p class="text-xs text-slate-400">${u.email}</p>
                            </div>
                        </div>
                        <button onclick="startChat('${u.uid}', '${u.username}')" class="bg-indigo-600/20 text-indigo-400 px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-indigo-600 hover:text-white transition active:opacity-50">Chat</button>
                    `;
                    list.appendChild(div);
                });
            } catch (err) { console.error(err); }
        }

        window.startChat = function(uid, username) {
            document.getElementById('chats-list-view').classList.add('hidden');
            const room = document.getElementById('active-chat-room');
            room.classList.remove('hidden');
            document.getElementById('chat-room-title').textContent = username;
        }

        document.getElementById('close-chat').addEventListener('click', () => {
            document.getElementById('active-chat-room').classList.add('hidden');
            document.getElementById('chats-list-view').classList.remove('hidden');
        });

    </script>
</body>
</html>
