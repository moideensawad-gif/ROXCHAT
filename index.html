<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roxchat – Media & Chat Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs & Initialization -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaqyhWJg8QmFzB4xKR5sJT8UetZEqZGrs",
            authDomain: "roxchat-529a0.firebaseapp.com",
            projectId: "roxchat-529a0",
            storageBucket: "roxchat-529a0.firebasestorage.app",
            messagingSenderId: "711075232006",
            appId: "1:711075232006:web:0f52e8d2eb707573ae8687",
            measurementId: "G-1JCBDGNB45"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.fbCreateUser = createUserWithEmailAndPassword;
        window.fbSignIn = signInWithEmailAndPassword;
        window.fbSignOut = signOut;
        window.fbCollection = collection;
        window.fbAddDoc = addDoc;
        window.fbGetDocs = getDocs;
        window.fbQuery = query;
        window.fbOrderBy = orderBy;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                showAppUI();
            } else {
                handleLogoutUI();
            }
        });
    </script>

    <style>
        :root {
            --primary-color: #0095f6;
            --bg-color: #000000;
            --border-color: #262626;
            --text-color: #f5f5f5;
            --card-bg: #121212;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); margin: 0; padding: 0 0 70px 0; display: flex; flex-direction: column; align-items: center; color: var(--text-color); }
        .container { background: var(--card-bg); padding: 15px; border-radius: 8px; width: 100%; max-width: 450px; margin-bottom: 15px; border: 1px solid var(--border-color); box-sizing: border-box; }
        input, textarea, button { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid var(--border-color); border-radius: 6px; background: var(--card-bg); color: var(--text-color); font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary-color); color: #fff; border: none; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
        .post { background: var(--card-bg); border: 1px solid var(--border-color); padding: 12px; margin-top: 10px; border-radius: 6px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 450px; margin: 10px 0; padding: 0 15px; box-sizing: border-box; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .post-media { width: 100%; max-height: 400px; object-fit: cover; border-radius: 4px; margin-top: 8px; }
        video { width: 100%; border-radius: 6px; background: #000; }
    </style>
</head>
<body data-theme="dark">

    <!-- Auth Section -->
    <div id="auth-container" class="container" style="margin-top: 40px;">
        <h2>Roxchat Online</h2>
        <div id="register-form">
            <h3>Sign Up</h3>
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-password" placeholder="Password">
            <button onclick="handleRegister()">Sign Up</button>
            <p onclick="toggleAuthMode()" style="color:var(--primary-color); cursor:pointer; font-size:14px; text-align:center;">Have an account? Log in</p>
        </div>
        <div id="login-form" class="hidden">
            <h3>Log In</h3>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="handleLogin()">Log In</button>
            <p onclick="toggleAuthMode()" style="color:var(--primary-color); cursor:pointer; font-size:14px; text-align:center;">Don't have an account? Sign up</p>
        </div>
    </div>

    <!-- Main App Section -->
    <div id="app-container" class="hidden" style="width: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center;">
        <div class="header-bar">
            <div style="font-weight:bold; font-size:22px;">Roxchat</div>
            <i class="fa-solid fa-right-from-bracket" onclick="handleLogout()" style="font-size:20px; cursor:pointer;"></i>
        </div>

        <!-- Feed & Camera / Voice Post Section -->
        <div class="container">
            <h4>Create Post with Camera / Text</h4>
            <textarea id="post-caption" placeholder="Write a caption..."></textarea>
            
            <!-- Camera Access Section -->
            <div style="margin: 10px 0;">
                <button onclick="openCamera()"><i class="fa-solid fa-camera"></i> Open Camera & Snap</button>
                <video id="camera-preview" class="hidden" autoplay playsinline></video>
                <button id="capture-btn" class="hidden" onclick="capturePhoto()">Capture Photo</button>
                <canvas id="snapshot-canvas" class="hidden"></canvas>
                <input type="hidden" id="captured-image-data">
            </div>

            <!-- Voice Record Section -->
            <div style="margin: 10px 0;">
                <button onclick="startVoiceRecord()"><i class="fa-solid fa-microphone"></i> Record Voice Note</button>
                <button id="stop-voice-btn" class="hidden" onclick="stopVoiceRecord()" style="background:red;">Stop Recording</button>
                <p id="voice-status" style="font-size:12px; text-align:center;"></p>
            </div>

            <button onclick="handleCreatePost()">Share Post Online</button>
        </div>

        <div id="feed-container" style="width:100%;"></div>
    </div>

    <script>
        let mediaStream = null;
        let mediaRecorder;
        let audioChunks = [];
        let recordedAudioUrl = "";

        function toggleAuthMode() {
            document.getElementById('register-form').classList.toggle('hidden');
            document.getElementById('login-form').classList.toggle('hidden');
        }

        async function handleRegister() {
            try {
                await window.fbCreateUser(window.firebaseAuth, document.getElementById('reg-email').value, document.getElementById('reg-password').value);
                alert("Account created!");
            } catch (e) { alert(e.message); }
        }

        async function handleLogin() {
            try {
                await window.fbSignIn(window.firebaseAuth, document.getElementById('login-email').value, document.getElementById('login-password').value);
            } catch (e) { alert(e.message); }
        }

        async function handleLogout() {
            await window.fbSignOut(window.firebaseAuth);
        }

        function showAppUI() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            loadPosts();
        }

        function handleLogoutUI() {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
        }

        // Camera Functions
        async function openCamera() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                const videoElement = document.getElementById('camera-preview');
                videoElement.srcObject = mediaStream;
                videoElement.classList.remove('hidden');
                document.getElementById('capture-btn').classList.remove('hidden');
            } catch (e) {
                alert("Camera access denied or not available.");
            }
        }

        function capturePhoto() {
            const videoElement = document.getElementById('camera-preview');
            const canvas = document.getElementById('snapshot-canvas');
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            
            const dataUrl = canvas.toDataURL('image/png');
            document.getElementById('captured-image-data').value = dataUrl;
            
            // Stop camera stream
            mediaStream.getTracks().forEach(track => track.stop());
            videoElement.classList.add('hidden');
            document.getElementById('capture-btn').classList.add('hidden');
            alert("Photo captured successfully!");
        }

        // Voice Record Functions
        async function startVoiceRecord() {
            audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = event => { audioChunks.push(event.data); };
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    recordedAudioUrl = URL.createObjectURL(audioBlob);
                    document.getElementById('voice-status').innerText = "Voice recorded ready to post!";
                };
                mediaRecorder.start();
                document.getElementById('voice-status').innerText = "Recording...";
                document.getElementById('stop-voice-btn').classList.remove('hidden');
            } catch (e) {
                alert("Microphone access denied.");
            }
        }

        function stopVoiceRecord() {
            if (mediaRecorder) {
                mediaRecorder.stop();
                document.getElementById('stop-voice-btn').classList.add('hidden');
            }
        }

        async function handleCreatePost() {
            const caption = document.getElementById('post-caption').value;
            const mediaUrl = document.getElementById('captured-image-data').value;
            const user = window.firebaseAuth.currentUser;

            try {
                await window.fbAddDoc(window.fbCollection(window.firebaseDb, "posts"), {
                    author: user.email,
                    caption: caption,
                    mediaUrl: mediaUrl,
                    audioUrl: recordedAudioUrl || "",
                    timestamp: Date.now()
                });
                document.getElementById('post-caption').value = '';
                document.getElementById('captured-image-data').value = '';
                recordedAudioUrl = "";
                document.getElementById('voice-status').innerText = "";
                alert("Posted successfully!");
                loadPosts();
            } catch (e) { alert(e.message); }
        }

        async function loadPosts() {
            const feedContainer = document.getElementById('feed-container');
            feedContainer.innerHTML = '<p style="text-align:center;">Loading...</p>';
            try {
                const q = window.fbQuery(window.fbCollection(window.firebaseDb, "posts"), window.fbOrderBy("timestamp", "desc"));
                const querySnapshot = await window.fbGetDocs(q);
                feedContainer.innerHTML = '';
                querySnapshot.forEach((doc) => {
                    const post = doc.data();
                    let imgHtml = post.mediaUrl ? `<img src="${post.mediaUrl}" class="post-media">` : '';
                    let audioHtml = post.audioUrl ? `<audio controls src="${post.audioUrl}" style="width:100%; margin-top:8px;"></audio>` : '';
                    feedContainer.innerHTML += `
                        <div class="post">
                            <div style="font-weight:bold; margin-bottom:6px;">@${post.author.split('@')[0]}</div>
                            <p>${post.caption}</p>
                            ${imgHtml}
                            ${audioHtml}
                        </div>
                    `;
                });
            } catch (e) {
                feedContainer.innerHTML = '<p style="text-align:center; color:red;">Failed to load.</p>';
            }
        }
    </script>
</body>
</html>
