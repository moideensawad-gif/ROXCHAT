<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roxchat</title>
    <meta name="description" content="Custom unique social chat app with Firebase">
    <meta name="theme-color" content="#000000">
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./Icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .brand-font { font-family: 'Pacifico', cursive; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-black text-white antialiased selection:bg-yellow-500 selection:text-black">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col justify-between pb-24 relative">
        <div class="flex items-center justify-center h-screen text-yellow-400">
            <i class="fa-solid fa-spinner fa-spin text-3xl"></i>
        </div>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="storyFileInput" accept="image/*" class="hidden" onchange="handleStoryUpload(event)">
    <input type="file" id="avatarFileInput" accept="image/*" class="hidden" onchange="handleAvatarUpload(event)">

    <nav id="bottomNav" class="hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-zinc-950/95 backdrop-blur-md border-t border-zinc-800/80 flex justify-around py-4 z-50 shadow-lg">
        <button onclick="switchTab('home')" id="nav-home" class="text-zinc-400 text-2xl transition transform active:scale-90"><i class="fa-solid fa-house-chimney"></i></button>
        <button onclick="switchTab('chat')" id="nav-chat" class="text-zinc-400 text-2xl transition transform active:scale-90"><i class="fa-solid fa-comments"></i></button>
        <button onclick="switchTab('explore')" id="nav-explore" class="text-zinc-400 text-2xl transition transform active:scale-90"><i class="fa-solid fa-compass"></i></button>
        <button onclick="switchTab('reels')" id="nav-reels" class="text-zinc-400 text-2xl transition transform active:scale-90"><i class="fa-solid fa-bolt"></i></button>
        <button onclick="switchTab('profile')" id="nav-profile" class="text-zinc-400 text-2xl transition transform active:scale-90"><i class="fa-solid fa-circle-user"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, doc, setDoc, getDoc, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaqyhWJg8QmFzB4xKR5sJT8UetZEqZGrs",
            authDomain: "roxchat-529a0.firebaseapp.com",
            projectId: "roxchat-529a0",
            storageBucket: "roxchat-529a0.firebasestorage.app",
            messagingSenderId: "711075232006",
            appId: "1:711075232006:web:0f52e8d2eb707573ae8687",
            measurementId: "G-1JCBDGNB45"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.auth = auth;
        window.db = db;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.signOut = signOut;
        window.updatePassword = updatePassword;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.getDoc = getDoc;
        window.updateDoc = updateDoc;
        window.collection = collection;
        window.query = query;
        window.orderBy = orderBy;
        window.where = where;
        window.serverTimestamp = serverTimestamp;
        window.doc = doc;
        window.setDoc = setDoc;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('bottomNav').classList.remove('hidden');
                await window.preloadUserData();
                switchTab('home');
            } else {
                document.getElementById('bottomNav').classList.add('hidden');
                window.currentUserData = null;
                renderLogin();
            }
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed:', err));
            });
        }

        let currentTab = 'home';
        let mediaRecorder = null;
        let audioChunks = [];
        window.currentUserData = null;

        window.preloadUserData = async function() {
            if (!window.auth.currentUser) return;
            try {
                const userRef = window.doc(window.db, "users", window.auth.currentUser.uid);
                let userDoc = await window.getDoc(userRef);
                if (userDoc.exists()) {
                    window.currentUserData = userDoc.data();
                } else {
                    window.currentUserData = {
                        uid: window.auth.currentUser.uid,
                        username: window.auth.currentUser.email ? window.auth.currentUser.email.split('@')[0] : "user",
                        email: window.auth.currentUser.email || "",
                        avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + window.auth.currentUser.uid,
                        bio: "Hey there! I am using Roxchat.",
                        isPrivate: false,
                        pushNotifications: true
                    };
                    await window.setDoc(userRef, { ...window.currentUserData, createdAt: window.serverTimestamp() });
                }
            } catch (e) {
                console.error("Preload error:", e);
                window.currentUserData = {
                    uid: window.auth.currentUser.uid,
                    username: window.auth.currentUser.email ? window.auth.currentUser.email.split('@')[0] : "user",
                    email: window.auth.currentUser.email || "",
                    avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + window.auth.currentUser.uid,
                    bio: "Hey there! I am using Roxchat.",
                    isPrivate: false,
                    pushNotifications: true
                };
            }
        }

        function triggerStoryPicker() {
            document.getElementById('storyFileInput').click();
        }

        function triggerAvatarPicker() {
            document.getElementById('avatarFileInput').click();
        }

        async function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                const avatarInput = document.getElementById('editAvatar');
                const avatarPreview = document.getElementById('profileAvatarPreview');
                if (avatarInput) avatarInput.value = base64Image;
                if (avatarPreview) avatarPreview.src = base64Image;
            };
            reader.readAsDataURL(file);
        }

        async function handleStoryUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64Image = e.target.result;
                try {
                    await window.addDoc(window.collection(window.db, "stories"), {
                        uid: window.auth.currentUser.uid,
                        username: window.currentUserData ? window.currentUserData.username : "User",
                        avatar: window.currentUserData ? window.currentUserData.avatar : "https://api.dicebear.com/7.x/avataaars/svg?seed=user",
                        imageUrl: base64Image,
                        createdAt: window.serverTimestamp()
                    });
                    alert("Story Posted Successfully!");
                    renderHome();
                } catch (err) {
                    alert("Failed to post story: " + err.message);
                }
            };
            reader.readAsDataURL(file);
        }

        function getTopHeaderHTML() {
            return `
                <div class="flex justify-between items-center mb-4 px-4 pt-4">
                    <h1 class="text-2xl brand-font text-yellow-400">Roxchat</h1>
                    <div class="flex items-center space-x-4 text-xl">
                        <button onclick="triggerStoryPicker()" class="text-zinc-300 hover:text-yellow-400 transition" title="Add Story"><i class="fa-solid fa-plus-circle"></i></button>
                        <button onclick="renderNotifications()" class="text-zinc-300 hover:text-yellow-400 transition relative" title="Notifications">
                            <i class="fa-solid fa-heart"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function getStoriesBarHTML() {
            let userAvatar = window.currentUserData?.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=myuser';
            return `
                <div class="flex space-x-3 overflow-x-auto no-scrollbar px-4 mb-4 py-1">
                    <div class="flex flex-col items-center flex-shrink-0 cursor-pointer" onclick="triggerStoryPicker()">
                        <div class="w-16 h-16 rounded-full p-[2px] bg-gradient-to-tr from-yellow-500 to-amber-300 relative">
                            <div class="w-full h-full bg-black rounded-full flex items-center justify-center overflow-hidden">
                                <img src="${userAvatar}" class="w-full h-full object-cover">
                            </div>
                            <div class="absolute bottom-0 right-0 bg-yellow-400 text-black rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold border-2 border-black">+</div>
                        </div>
                        <span class="text-[11px] text-zinc-300 mt-1">Your Story</span>
                    </div>
                </div>
            `;
        }

        function switchTab(tab) {
            currentTab = tab;
            const tabs = ['home', 'chat', 'explore', 'reels', 'profile'];
            tabs.forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if (btn) {
                    if (t === tab) {
                        btn.classList.remove('text-zinc-400');
                        btn.classList.add('text-yellow-400');
                    } else {
                        btn.classList.remove('text-yellow-400');
                        btn.classList.add('text-zinc-400');
                    }
                }
            });

            if (tab === 'home') renderHome();
            else if (tab === 'explore') renderExplore();
            else if (tab === 'reels') renderReels();
            else if (tab === 'chat') renderChatInboxList();
            else if (tab === 'profile') renderProfile();
        }

        function renderLogin(isSignup = false) {
            document.getElementById('app').innerHTML = `
                <div class="p-6 flex flex-col justify-center items-center min-h-screen bg-black">
                    <div class="w-full max-w-sm bg-zinc-950 border border-zinc-800/80 p-8 rounded-2xl shadow-xl">
                        <div class="text-center mb-8">
                            <h1 class="text-4xl brand-font tracking-wide text-yellow-400">Roxchat</h1>
                            <p class="text-xs text-zinc-500 mt-2">Connect with your world differently</p>
                        </div>
                        <div class="space-y-3.5">
                            ${isSignup ? '<input type="text" id="username" placeholder="Username (Unique)" class="w-full bg-zinc-900 border border-zinc-800 p-3.5 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400 transition">' : ''}
                            <input type="email" id="email" placeholder="Email address" class="w-full bg-zinc-900 border border-zinc-800 p-3.5 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400 transition">
                            <input type="password" id="password" placeholder="Password" class="w-full bg-zinc-900 border border-zinc-800 p-3.5 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400 transition">
                            <button onclick="${isSignup ? 'handleSignup()' : 'handleLogin()'}" class="w-full bg-yellow-400 hover:bg-yellow-500 text-black p-3.5 rounded-xl font-bold text-sm transition shadow-lg shadow-yellow-400/10 mt-2">${isSignup ? 'Create Account' : 'Sign In'}</button>
                        </div>
                    </div>
                    <div class="w-full max-w-sm bg-zinc-950 border border-zinc-800/80 p-4 rounded-xl mt-3 text-center">
                        <p class="text-xs text-zinc-400">
                            ${isSignup ? 'Already have an account?' : "Don't have an account?"} 
                            <span class="text-yellow-400 font-bold cursor-pointer ml-1" onclick="renderLogin(${!isSignup})">${isSignup ? 'Sign In' : 'Sign up'}</span>
                        </p>
                    </div>
                </div>
            `;
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await window.signInWithEmailAndPassword(window.auth, email, password);
            } catch (error) {
                alert("Login Error: " + error.message);
            }
        }

        async function handleSignup() {
            const usernameInput = document.getElementById('username').value.trim().toLowerCase();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!usernameInput) return alert("Please enter a username!");

            try {
                const q = window.query(window.collection(window.db, "users"), window.where("username", "==", usernameInput));
                const querySnapshot = await window.getDocs(q);
                
                if (!querySnapshot.empty) {
                    alert("Username is already taken. Choose another one.");
                    return;
                }

                const userCredential = await window.createUserWithEmailAndPassword(window.auth, email, password);
                const user = userCredential.user;

                window.currentUserData = {
                    uid: user.uid,
                    username: usernameInput,
                    email: email,
                    bio: "Hey there! I am using Roxchat.",
                    avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + usernameInput,
                    isPrivate: false,
                    pushNotifications: true,
                    createdAt: window.serverTimestamp()
                };

                await window.setDoc(window.doc(window.db, "users", user.uid), window.currentUserData);
                switchTab('home');
            } catch (error) {
                alert("Signup Error: " + error.message);
            }
        }

        function renderHome() {
            document.getElementById('app').innerHTML = `
                <div>
                    ${getTopHeaderHTML()}
                    ${getStoriesBarHTML()}
                    <div class="px-4 py-6 text-center text-zinc-500 text-sm">Welcome to Roxchat Home Feed!</div>
                </div>
            `;
        }

        async function renderNotifications() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="p-4">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold text-yellow-400">Notifications</h2>
                        <button onclick="switchTab('home')" class="text-zinc-400 text-sm"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    </div>
                    <div id="notifList" class="space-y-3">
                        <div class="text-center text-zinc-500 text-sm py-10">Loading notifications...</div>
                    </div>
                </div>
            `;

            try {
                const q = window.query(
                    window.collection(window.db, "notifications"), 
                    window.where("receiverUid", "==", window.auth.currentUser.uid),
                    window.orderBy("timestamp", "desc")
                );
                const snapshot = await window.getDocs(q);
                const notifList = document.getElementById('notifList');
                
                if (snapshot.empty) {
                    notifList.innerHTML = `<div class="text-center text-zinc-500 text-sm py-10">No notifications yet.</div>`;
                    return;
                }

                let html = '';
                snapshot.forEach(docSnap => {
                    const notif = docSnap.data();
                    let icon = "fa-bell text-yellow-400";
                    if(notif.type === 'like') icon = "fa-heart text-red-500";
                    if(notif.type === 'comment') icon = "fa-comment text-blue-400";
                    if(notif.type === 'message') icon = "fa-paper-plane text-yellow-400";

                    html += `
                        <div class="flex items-center space-x-3 bg-zinc-900 border border-zinc-800 p-3 rounded-xl">
                            <i class="fa-solid ${icon} text-lg w-6 text-center"></i>
                            <div class="flex-1 text-sm">
                                <span class="font-semibold text-white">${notif.senderUsername || 'Someone'}</span> 
                                <span class="text-zinc-300">${notif.text}</span>
                            </div>
                        </div>
                    `;
                });
                notifList.innerHTML = html;
            } catch (e) {
                console.error("Error loading notifications:", e);
                document.getElementById('notifList').innerHTML = `<div class="text-center text-zinc-500 text-sm">Failed to load notifications.</div>`;
            }
        }

        async function renderExplore() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div>
                    ${getTopHeaderHTML()}
                    <div class="p-4 pt-0">
                        <h2 class="text-xl font-bold mb-4 text-yellow-400">Explore Users</h2>
                        <div id="exploreUsersList" class="space-y-3 text-center text-zinc-400">Loading users...</div>
                    </div>
                </div>
            `;
            
            try {
                const querySnapshot = await window.getDocs(window.collection(window.db, "users"));
                let usersHTML = `<div class="space-y-3">`;
                
                querySnapshot.forEach((docSnap) => {
                    const userData = docSnap.data();
                    if(userData.uid !== window.auth.currentUser.uid) {
                        usersHTML += `
                            <div onclick="openChatRoom('${userData.uid}', '${userData.username}')" class="flex items-center justify-between bg-zinc-900 border border-zinc-800 p-3.5 rounded-xl cursor-pointer hover:border-yellow-400 transition">
                                <div class="flex items-center space-x-3">
                                    <img src="${userData.avatar}" class="w-10 h-10 rounded-full bg-zinc-800 object-cover">
                                    <span class="font-semibold text-white">${userData.username}</span>
                                </div>
                                <i class="fa-solid fa-comments text-yellow-400 text-lg"></i>
                            </div>
                        `;
                    }
                });
                
                usersHTML += `</div>`;
                document.getElementById('exploreUsersList').innerHTML = usersHTML;
            } catch (error) {
                console.error("Error loading users:", error);
            }
        }

        async function renderChatInboxList() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div>
                    ${getTopHeaderHTML()}
                    <div class="p-4 pt-0">
                        <h2 class="text-xl font-bold mb-4 text-yellow-400">Direct Messages</h2>
                        <div id="directUsersList" class="space-y-3 text-center text-zinc-400">Loading chats...</div>
                    </div>
                </div>
            `;

            try {
                const querySnapshot = await window.getDocs(window.collection(window.db, "users"));
                let usersHTML = `<div class="space-y-3">`;
                let count = 0;
                
                querySnapshot.forEach((docSnap) => {
                    const userData = docSnap.data();
                    if(userData.uid !== window.auth.currentUser.uid) {
                        count++;
                        usersHTML += `
                            <div onclick="openChatRoom('${userData.uid}', '${userData.username}')" class="flex items-center justify-between bg-zinc-900/80 border border-zinc-800 p-3.5 rounded-xl cursor-pointer hover:border-yellow-400 transition">
                                <div class="flex items-center space-x-3">
                                    <img src="${userData.avatar}" class="w-12 h-12 rounded-full bg-zinc-800 object-cover">
                                    <div>
                                        <h4 class="font-bold text-white text-sm">${userData.username}</h4>
                                        <p class="text-xs text-zinc-400">Tap to open chat</p>
                                    </div>
                                </div>
                                <i class="fa-solid fa-paper-plane text-yellow-400 text-base"></i>
                            </div>
                        `;
                    }
                });
                
                usersHTML += `</div>`;

                if (count === 0) {
                    usersHTML = `<div class="text-zinc-500 text-sm py-6">No users found.</div>`;
                }

                document.getElementById('directUsersList').innerHTML = usersHTML;
            } catch (error) {
                console.error("Error loading chats:", error);
                document.getElementById('directUsersList').innerHTML = `<div class="text-red-500 text-sm">Failed to load direct messages.</div>`;
            }
        }

        async function openChatRoom(peerUid, peerUsername) {
            const currentUid = window.auth.currentUser.uid;
            const chatId = currentUid < peerUid ? `${currentUid}_${peerUid}` : `${peerUid}_${currentUid}`;
            
            document.getElementById('app').innerHTML = `
                <div class="flex flex-col h-screen bg-black">
                    <div class="flex items-center justify-between p-4 bg-zinc-950 border-b border-zinc-800">
                        <button onclick="switchTab('chat')" class="text-zinc-400 text-lg"><i class="fa-solid fa-arrow-left"></i></button>
                        <h2 class="font-bold text-white">${peerUsername}</h2>
                        <div class="w-6"></div>
                    </div>
                    
                    <div id="messageContainer" class="flex-1 overflow-y-auto p-4 space-y-3 pb-24">
                        <div class="text-center text-zinc-500 text-xs">Private chat room with ${peerUsername}.</div>
                    </div>
                    
                    <div class="fixed bottom-16 left-0 right-0 max-w-md mx-auto p-3 bg-zinc-950 border-t border-zinc-800 flex items-center space-x-2">
                        <input type="text" id="chatInput" placeholder="Message..." class="flex-1 bg-zinc-900 border border-zinc-800 text-white p-3 rounded-xl text-sm focus:outline-none focus:border-yellow-400">
                        <button onclick="toggleVoiceRecord('${chatId}', '${peerUid}')" id="micBtn" class="bg-zinc-800 hover:bg-zinc-700 text-yellow-400 px-3.5 py-3 rounded-xl text-sm"><i class="fa-solid fa-microphone"></i></button>
                        <button onclick="sendPrivateMessage('${chatId}', '${peerUid}')" class="bg-yellow-400 text-black px-4 py-3 rounded-xl font-bold text-sm">Send</button>
                    </div>
                </div>
            `;
            
            loadPrivateMessages(chatId);
        }

        async function sendPrivateMessage(chatId, peerUid, customText = null, audioUrl = null) {
            const input = document.getElementById('chatInput');
            const text = customText || (input ? input.value.trim() : '');
            if (!text && !audioUrl) return;
            
            try {
                let msgData = {
                    sender: window.auth.currentUser.uid,
                    timestamp: window.serverTimestamp()
                };

                if(audioUrl) {
                    msgData.audioUrl = audioUrl;
                    msgData.text = "[Voice Note]";
                } else {
                    msgData.text = text;
                }

                await window.addDoc(window.collection(window.db, "chats", chatId, "messages"), msgData);

                const senderUsername = window.currentUserData ? window.currentUserData.username : "Someone";

                await window.addDoc(window.collection(window.db, "notifications"), {
                    receiverUid: peerUid,
                    senderUid: window.auth.currentUser.uid,
                    senderUsername: senderUsername,
                    type: 'message',
                    text: audioUrl ? `sent you a voice note.` : `sent you a message: "${text.substring(0, 20)}..."`,
                    timestamp: window.serverTimestamp()
                });

                if(input && !customText) input.value = '';
                loadPrivateMessages(chatId);
            } catch (e) {
                console.error("Error sending message: ", e);
            }
        }

        async function toggleVoiceRecord(chatId, peerUid) {
            const micBtn = document.getElementById('micBtn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = async () => {
                            const base64Audio = reader.result;
                            await sendPrivateMessage(chatId, peerUid, null, base64Audio);
                        };
                    };

                    mediaRecorder.start();
                    micBtn.classList.remove('bg-zinc-800', 'text-yellow-400');
                    micBtn.classList.add('bg-red-600', 'text-white', 'animate-pulse');
                } catch (e) {
                    alert("Microphone access denied or not supported.");
                }
            } else {
                mediaRecorder.stop();
                micBtn.classList.remove('bg-red-600', 'text-white', 'animate-pulse');
                micBtn.classList.add('bg-zinc-800', 'text-yellow-400');
            }
        }

        async function loadPrivateMessages(chatId) {
            const container = document.getElementById('messageContainer');
            try {
                const q = window.query(
                    window.collection(window.db, "chats", chatId, "messages"), 
                    window.orderBy("timestamp", "asc")
                );
                const snapshot = await window.getDocs(q);
                
                let html = '';
                snapshot.forEach(docSnap => {
                    const msg = docSnap.data();
                    const isMe = msg.sender === window.auth.currentUser.uid;
                    
                    let contentHtml = msg.text;
                    if(msg.audioUrl) {
                        contentHtml = `<audio controls class="h-8 max-w-[200px]"><source src="${msg.audioUrl}" type="audio/webm">Your browser does not support audio.</audio>`;
                    }

                    html += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                            <div class="max-w-[70%] p-3 rounded-2xl text-sm ${isMe ? 'bg-yellow-400 text-black rounded-br-none' : 'bg-zinc-900 text-white border border-zinc-800 rounded-bl-none'}">
                                ${contentHtml}
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                console.error("Error loading messages:", e);
            }
        }

        function renderReels() {
            document.getElementById('app').innerHTML = `
                <div>
                    ${getTopHeaderHTML()}
                    <div class="p-4 text-zinc-400 text-center">Reels page coming soon!</div>
                </div>
            `;
        }

        async function renderProfile() {

                await window.preloadUserData();
            }

            const userData = window.currentUserData || {
                username: "user",
                avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=default",
                bio: "Hey there! I am using Roxchat.",
                isPrivate: false,
                pushNotifications: true
            };

            document.getElementById('app').innerHTML = `
                <div>
                    ${getTopHeaderHTML()}
                    <div class="p-4 text-center">
                        <div class="flex flex-col items-center mt-2">
                            <div class="relative group mb-3 cursor-pointer" onclick="triggerAvatarPicker()" title="Change Profile Picture">
                                <img id="profileAvatarPreview" src="${userData.avatar}" class="w-24 h-24 rounded-full border-2 border-yellow-400 bg-zinc-800 object-cover">
                                <div class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition">

                                    <input type="text" id="editUsername" value="${userData.username || ''}" class="w-full bg-zinc-900 border border-zinc-800 p-2.5 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400">
                                </div>
                                <div>
                                    <label class="text-xs text-zinc-400 ml-1">Avatar Image URL or Uploaded</label>
                                    <input type="text" id="editAvatar" value="${userData.avatar || ''}" class="w-full bg-zinc-900 border border-zinc-800 p-2.5 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400" placeholder="Paste image link or pick from gallery">
                                </div>
                                <div>
                                    <label class="text-xs text-zinc-400 ml-1">Bio</label>
                                    <textarea id="editBio" class="w-full bg-zinc-900 border border-zinc-800 p-2.5 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400 resize-none h-16">${userData.bio || ''}</textarea>
                                </div>
                                <button onclick="saveProfileChanges()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-black py-2.5 rounded-xl font-bold text-sm transition shadow-md">Save Changes</button>
                            </div>
                            
                            <div class="w-full max-w-xs mt-8 pt-6 border-t border-zinc-800/80 text-left">
                                <h3 class="text-sm font-bold text-yellow-400 mb-3 uppercase tracking-wider flex items-center space-x-2">
                                    <i class="fa-solid fa-gear"></i> <span>Roxchat Settings & Support</span>
                                </h3>
                                
                                <div class="space-y-2 mb-6">
                                    <div class="flex items-center justify-between bg-zinc-900/60 border border-zinc-800/80 p-3 rounded-xl text-sm">
                                        <span class="text-zinc-300">Private Account</span>
                                        <input type="checkbox" id="settingPrivate" ${userData.isPrivate ? 'checked' : ''} class="accent-yellow-400 w-4 h-4 cursor-pointer">
                                    </div>
                                    <div class="flex items-center justify-between bg-zinc-900/60 border border-zinc-800/80 p-3 rounded-xl text-sm">
                                        <span class="text-zinc-300">Push Notifications</span>
                                        <input type="checkbox" id="settingNotif" ${userData.pushNotifications !== false ? 'checked' : ''} class="accent-yellow-400 w-4 h-4 cursor-pointer">
                                    </div>

                                    <!-- Working Feature: Blocked Accounts -->
                                    <div onclick="openBlockedUsersModal()" class="flex items-center justify-between bg-zinc-900/60 border border-zinc-800/80 p-3 rounded-xl text-sm cursor-pointer hover:border-yellow-400 transition">
                                        <span class="text-zinc-300"><i class="fa-solid fa-ban text-red-400 mr-2"></i> Blocked Accounts</span>
                                        <i class="fa-solid fa-chevron-right text-xs text-zinc-500"></i>
                                    </div>

                                    <!-- Working Feature: Saved Items -->
                                    <div onclick="openSavedItemsModal()" class="flex items-center justify-between bg-zinc-900/60 border border-zinc-800/80 p-3 rounded-xl text-sm cursor-pointer hover:border-yellow-400 transition">
                                        <span class="text-zinc-300"><i class="fa-solid fa-bookmark text-yellow-400 mr-2"></i> Saved Messages</span>
                                        <i class="fa-solid fa-chevron-right text-xs text-zinc-500"></i>
                                    </div>

                                    <!-- Working Feature: Help & Customer Complaint Resolution -->
                                    <div onclick="openHelpSupportModal()" class="flex items-center justify-between bg-zinc-900/60 border border-zinc-800/80 p-3 rounded-xl text-sm cursor-pointer hover:border-yellow-400 transition">
                                        <span class="text-zinc-300"><i class="fa-solid fa-circle-question text-blue-400 mr-2"></i> Help / Report a Problem</span>
                                        <i class="fa-solid fa-chevron-right text-xs text-zinc-500"></i>
                                    </div>

                                    <div class="bg-zinc-900/60 border border-zinc-800/80 p-3 rounded-xl text-sm space-y-2">
                                        <span class="text-zinc-300 font-semibold block">Change Password</span>
                                        <input type="password" id="newPasswordInput" placeholder="New Password" class="w-full bg-zinc-950 border border-zinc-800 p-2 rounded-lg text-xs text-white focus:outline-none focus:border-yellow-400">
                                        <button onclick="handleChangePassword()" class="w-full bg-zinc-800 hover:bg-zinc-700 text-yellow-400 py-1.5 rounded-lg text-xs font-bold transition">Update Password</button>
                                    </div>

                                    <div class="flex items-center justify-between bg-zinc-900/60 border border-zinc-800/80 p-3 rounded-xl text-sm cursor-pointer hover:border-yellow-400 transition" onclick="alert('Roxchat v1.1.0 - Built with Firebase & Tailwind CSS')">

                                    <p class="text-[11px] text-zinc-500 mb-4">Secure & Fast Social Connection</p>
                                    <button onclick="handleLogout()" class="w-full bg-zinc-900 border border-zinc-800 text-red-400 py-2.5 rounded-xl font-bold text-sm hover:border-red-500 transition flex items-center justify-center space-x-2">
                                        <i class="fa-solid fa-right-from-bracket"></i>
                                        <span>Log Out</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Functional Modals for New Roxchat Settings & Customer Complaints
        function openBlockedUsersModal() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="p-4">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold text-yellow-400">Blocked Accounts</h2>
                        <button onclick="switchTab('profile')" class="text-zinc-400 text-sm"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    </div>
                    <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-center text-zinc-400 text-sm py-10">
                        <i class="fa-solid fa-user-slash text-3xl mb-2 text-zinc-600"></i>
                        <p>No blocked accounts currently.</p>
                    </div>
                </div>
            `;
        }

        function openSavedItemsModal() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="p-4">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold text-yellow-400">Saved Messages</h2>
                        <button onclick="switchTab('profile')" class="text-zinc-400 text-sm"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    </div>
                    <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-center text-zinc-400 text-sm py-10">
                        <i class="fa-solid fa-bookmark text-3xl mb-2 text-yellow-500"></i>
                        <p>No saved messages yet.</p>
                    </div>
                </div>
            `;
        }

        function openHelpSupportModal() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="p-4">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold text-yellow-400">Help & Customer Support</h2>
                        <button onclick="switchTab('profile')" class="text-zinc-400 text-sm"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    </div>
                    <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl space-y-3">
                        <p class="text-xs text-zinc-400">Having issues or complaints? Send your feedback directly to our support team.</p>
                        <textarea id="complaintInput" placeholder="Describe your issue or complaint here..." class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl text-sm text-white focus:outline-none focus:border-yellow-400 resize-none h-32"></textarea>
                        <button onclick="submitCustomerComplaint()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-black py-2.5 rounded-xl font-bold text-sm transition shadow-md">Submit Complaint</button>
                    </div>
                </div>
            `;
        }

        async function submitCustomerComplaint() {
            const text = document.getElementById('complaintInput').value.trim();
            if (!text) {
                alert("Please enter your complaint details!");
                return;
            }
            try {
                await window.addDoc(window.collection(window.db, "complaints"), {
                    uid: window.auth.currentUser.uid,
                    email: window.currentUserData.email,
                    complaint: text,
                    status: "Pending",
                    timestamp: window.serverTimestamp()
                });
                alert("Your complaint has been submitted successfully! We will resolve it soon.");
                switchTab('profile');
            } catch (e) {
                alert("Error submitting complaint: " + e.message);
            }
        }

        async function saveProfileChanges() {
            const newUsername = document.getElementById('editUsername').value.trim().toLowerCase();
            const newAvatar = document.getElementById('editAvatar').value.trim();
            const newBio = document.getElementById('editBio').value.trim();
            const isPrivate = document.getElementById('settingPrivate').checked;
            const pushNotifications = document.getElementById('settingNotif').checked;

            if (!newUsername) {
                alert("Username cannot be empty!");
                return;
            }

            try {
                const userRef = window.doc(window.db, "users", window.auth.currentUser.uid);
                const updatedData = {
                    username: newUsername,
                    avatar: newAvatar,
                    bio: newBio,
                    isPrivate: isPrivate,
                    pushNotifications: pushNotifications
                };

                await window.updateDoc(userRef, updatedData);

                window.currentUserData = {
                    ...window.currentUserData,
                    ...updatedData
                };

                alert("Profile and settings updated successfully!");
                renderProfile();
            } catch (e) {
                alert("Error updating profile: " + e.message);
            }
        }

        async function handleChangePassword() {
            const newPass = document.getElementById('newPasswordInput').value;
            if (!newPass || newPass.length < 6) {
                alert("Password must be at least 6 characters long!");
                return;
            }
            try {
                await window.updatePassword(window.auth.currentUser, newPass);
                alert("Password updated successfully!");
                document.getElementById('newPasswordInput').value = '';
            } catch (e) {
                alert("Error updating password: " + e.message + "\n(Note: You may need to re-login recently to update password)");
            }
        }

        async function handleLogout() {
            try {
                await window.signOut(window.auth);
                window.currentUserData = null;
            } catch (e) {
                alert("Logout Error: " + e.message);
            }
        }
    </script>
</body>
</html>
