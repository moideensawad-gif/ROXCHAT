<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roxchat – Voice & Chat Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs & Initialization -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaqyhWJg8QmFzB4xKR5sJT8UetZEqZGrs",
            authDomain: "roxchat-529a0.firebaseapp.com",
            projectId: "roxchat-529a0",
            storageBucket: "roxchat-529a0.firebasestorage.app",
            messagingSenderId: "711075232006",
            appId: "1:711075232006:web:0f52e8d2eb707573ae8687",
            measurementId: "G-1JCBDGNB45"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.fbCreateUser = createUserWithEmailAndPassword;
        window.fbSignIn = signInWithEmailAndPassword;
        window.fbSignOut = signOut;
        window.fbCollection = collection;
        window.fbAddDoc = addDoc;
        window.fbGetDocs = getDocs;
        window.fbOnSnapshot = onSnapshot;
        window.fbQuery = query;
        window.fbOrderBy = orderBy;
        window.fbDoc = doc;
        window.fbUpdateDoc = updateDoc;
        window.fbArrayUnion = arrayUnion;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                showAppUI(user);
            } else {
                handleLogoutUI();
            }
        });
    </script>

    <style>
        :root {
            --primary-color: #0095f6;
            --bg-color: #000000;
            --border-color: #262626;
            --text-color: #f5f5f5;
            --card-bg: #121212;
        }
        [data-theme="light"] {
            --bg-color: #fafafa;
            --border-color: #dbdbdb;
            --text-color: #262626;
            --card-bg: #ffffff;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); margin: 0; padding: 0 0 70px 0; display: flex; flex-direction: column; align-items: center; color: var(--text-color); }
        .container { background: var(--card-bg); padding: 15px; border-radius: 8px; width: 100%; max-width: 450px; margin-bottom: 15px; border: 1px solid var(--border-color); box-sizing: border-box; }
        input, textarea, button { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid var(--border-color); border-radius: 6px; background: var(--card-bg); color: var(--text-color); font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary-color); color: #fff; border: none; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
        .post { background: var(--card-bg); border: 1px solid var(--border-color); padding: 12px; margin-top: 10px; border-radius: 6px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 450px; margin: 10px 0; padding: 0 15px; box-sizing: border-box; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card-bg); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .bottom-nav-item { background: none; border: none; color: var(--text-color); font-size: 22px; cursor: pointer; width: auto; margin: 0; padding: 0; }
        .post-media { width: 100%; max-height: 400px; object-fit: cover; border-radius: 4px; margin-top: 8px; }
        .chat-box { height: 250px; overflow-y: auto; border: 1px solid var(--border-color); padding: 10px; border-radius: 6px; display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 75%; font-size: 14px; }
        .msg-my { background: var(--primary-color); color: #fff; align-self: flex-end; }
        .msg-other { background: var(--border-color); color: var(--text-color); align-self: flex-start; }
    </style>
</head>
<body data-theme="dark">

    <!-- Auth Section -->
    <div id="auth-container" class="container" style="margin-top: 40px;">
        <h2>Roxchat Social</h2>
        <div id="register-form">
            <h3>Sign Up</h3>
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-password" placeholder="Password">
            <button onclick="handleRegister()">Sign Up</button>
            <p onclick="toggleAuthMode()" style="color:var(--primary-color); cursor:pointer; font-size:14px; text-align:center;">Have an account? Log in</p>
        </div>
        <div id="login-form" class="hidden">
            <h3>Log In</h3>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="handleLogin()">Log In</button>
            <p onclick="toggleAuthMode()" style="color:var(--primary-color); cursor:pointer; font-size:14px; text-align:center;">Don't have an account? Sign up</p>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" class="hidden" style="width: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center;">
        
        <div class="header-bar">
            <div style="font-weight:bold; font-size:24px; letter-spacing:1px;">Roxchat</div>
            <div style="display:flex; gap:15px; align-items:center;">
                <i class="fa-solid fa-circle-half-stroke" onclick="toggleDarkMode()" style="cursor:pointer; font-size:20px;"></i>
                <i class="fa-solid fa-right-from-bracket" onclick="handleLogout()" style="cursor:pointer; font-size:20px; color:red;"></i>
            </div>
        </div>

        <!-- TAB 1: FEED & STORIES -->
        <div id="tab-feed" class="container" style="border:none; background:transparent; padding:0;">
            <!-- Story Section -->
            <div class="container">
                <h4>Create Story (24h Limit)</h4>
                <input type="text" id="story-url" placeholder="Story Image URL...">
                <button onclick="handleCreateStory()">Add Story</button>
                <div id="stories-container" style="display:flex; gap:10px; overflow-x:auto; margin-top:10px;"></div>
            </div>

            <!-- Post Section with Voice Note & Timer -->
            <div class="container">
                <h4>Create Post / Voice Note</h4>
                <textarea id="post-caption" placeholder="What's on your mind?"></textarea>
                <input type="text" id="post-media-url" placeholder="Image URL (Optional)...">
                
                <!-- Voice Recorder & Timer Controls -->
                <div style="margin: 8px 0; display:flex; gap:10px; align-items:center;">
                    <button type="button" onclick="startVoiceRecord()" style="background:#333; width:auto; padding:10px 15px;"><i class="fa-solid fa-microphone"></i> Record</button>
                    <button type="button" onclick="stopVoiceRecord()" style="background:red; width:auto; padding:10px 15px;" id="stop-rec-btn" class="hidden"><i class="fa-solid fa-stop"></i> Stop</button>
                    <span id="timer-display" style="font-weight:bold; color:red; font-size:16px;">00:00</span>
                </div>
                <p id="rec-status" style="font-size:12px; color:gray;"></p>
                <audio id="audio-preview" controls class="hidden" style="width:100%; margin:5px 0;"></audio>

                <button onclick="handleCreatePost()">Share Post</button>
            </div>
            
            <div id="feed-container"></div>
        </div>

        <!-- TAB 2: CHAT / INBOX -->
        <div id="tab-chat" class="container hidden" style="border:none; background:transparent; padding:0;">
            <div class="container">
                <h4>Live Inbox Chat</h4>
                <div id="chat-messages" class="chat-box"></div>
                <input type="text" id="chat-input" placeholder="Type a message...">
                <button onclick="sendChatMessage()">Send Message</button>
            </div>
        </div>

        <!-- TAB 3: PROFILE -->
        <div id="tab-profile" class="container hidden" style="text-align:center;">
            <h3>My Profile</h3>
            <i class="fa-solid fa-user-circle" style="font-size:80px; color:var(--primary-color); margin:10px 0;"></i>
            <p id="profile-email" style="font-weight:bold;"></p>
            <p style="font-size:14px; color:gray;">Active Online Account</p>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="bottom-nav-item" onclick="switchTab('feed')"><i class="fa-solid fa-house"></i></button>
            <button class="bottom-nav-item" onclick="switchTab('chat')"><i class="fa-solid fa-comments"></i></button>
            <button class="bottom-nav-item" onclick="switchTab('profile')"><i class="fa-solid fa-user"></i></button>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let recordedAudioBlobUrl = "";
        let timerInterval;
        let secondsElapsed = 0;

        function toggleDarkMode() {
            let current = document.body.getAttribute('data-theme');
            let next = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
        }

        function toggleAuthMode() {
            document.getElementById('register-form').classList.toggle('hidden');
            document.getElementById('login-form').classList.toggle('hidden');
        }

        async function handleRegister() {
            try {
                await window.fbCreateUser(window.firebaseAuth, document.getElementById('reg-email').value, document.getElementById('reg-password').value);
                alert("Account created successfully!");
            } catch (e) { alert(e.message); }
        }

        async function handleLogin() {
            try {
                await window.fbSignIn(window.firebaseAuth, document.getElementById('login-email').value, document.getElementById('login-password').value);
            } catch (e) { alert(e.message); }
        }

        async function handleLogout() {
            await window.fbSignOut(window.firebaseAuth);
        }

        function showAppUI(user) {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('profile-email').innerText = user.email;
            loadPosts();
            loadStories();
            loadChatMessages();
        }

        function handleLogoutUI() {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
        }

        function switchTab(tab) {
            document.getElementById('tab-feed').classList.add('hidden');
            document.getElementById('tab-chat').classList.add('hidden');
            document.getElementById('tab-profile').classList.add('hidden');
            if(tab === 'feed') document.getElementById('tab-feed').classList.remove('hidden');
            if(tab === 'chat') document.getElementById('tab-chat').classList.remove('hidden');
            if(tab === 'profile') document.getElementById('tab-profile').classList.remove('hidden');
        }

        // --- VOICE RECORDER WITH TIMER ---
        async function startVoiceRecord() {
            audioChunks = [];
            secondsElapsed = 0;
            document.getElementById('timer-display').innerText = "00:00";
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                
                mediaRecorder.onstop = () => {
                    clearInterval(timerInterval);
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp4' }); // iOS compatible format
                    recordedAudioBlobUrl = URL.createObjectURL(audioBlob);
                    const preview = document.getElementById('audio-preview');
                    preview.src = recordedAudioBlobUrl;
                    preview.classList.remove('hidden');
                    document.getElementById('rec-status').innerText = `Voice recorded (${secondsElapsed} seconds). Play above to check!`;
                };

                mediaRecorder.start();
                document.getElementById('stop-rec-btn').classList.remove('hidden');
                document.getElementById('rec-status').innerText = "Recording...";

                // Start Timer
                timerInterval = setInterval(() => {
                    secondsElapsed++;
                    let mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
                    let secs = (secondsElapsed % 60).toString().padStart(2, '0');
                    document.getElementById('timer-display').innerText = `${mins}:${secs}`;
                }, 1000);

            } catch (err) {
                alert("Microphone permission denied or not supported.");
            }
        }

        function stopVoiceRecord() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                document.getElementById('stop-rec-btn').classList.add('hidden');
            }
        }

        // --- POSTS & VOICE NOTES ---
        async function handleCreatePost() {
            const caption = document.getElementById('post-caption').value;
            const mediaUrl = document.getElementById('post-media-url').value;
            const user = window.firebaseAuth.currentUser;
            
            if(!caption && !mediaUrl && !recordedAudioBlobUrl) return alert("Write something or record a voice note!");

            try {
                await window.fbAddDoc(window.fbCollection(window.firebaseDb, "posts"), {
                    author: user.email, 
                    caption, 
                    mediaUrl, 
                    audioUrl: recordedAudioBlobUrl || "", 
                    audioDuration: secondsElapsed,
                    likes: [], 
                    timestamp: Date.now()
                });
                document.getElementById('post-caption').value = '';
                document.getElementById('post-media-url').value = '';
                document.getElementById('audio-preview').classList.add('hidden');
                document.getElementById('rec-status').innerText = '';
                document.getElementById('timer-display').innerText = "00:00";
                recordedAudioBlobUrl = "";
                secondsElapsed = 0;
                loadPosts();
            } catch(e) { alert(e.message); }
        }

        async function loadPosts() {
            const container = document.getElementById('feed-container');
            const q = window.fbQuery(window.fbCollection(window.firebaseDb, "posts"), window.fbOrderBy("timestamp", "desc"));
            const snapshot = await window.fbGetDocs(q);
            container.innerHTML = '';
            snapshot.forEach((docSnap) => {
                const post = docSnap.data();
                const postId = docSnap.id;
                let media = post.mediaUrl ? `<img src="${post.mediaUrl}" class="post-media">` : '';
                let audio = post.audioUrl ? `
                    <div style="margin-top:8px; background:rgba(255,255,255,0.05); padding:8px; border-radius:6px;">
                        <span style="font-size:12px; color:var(--primary-color);">🎤 Voice Note (${post.audioDuration || 0}s)</span>
                        <audio controls src="${post.audioUrl}" style="width:100%; margin-top:4px;"></audio>
                    </div>` : '';
                container.innerHTML += `
                    <div class="post">
                        <div style="font-weight:bold; margin-bottom:5px;">@${post.author.split('@')[0]}</div>
                        <p>${post.caption}</p>
                        ${media}
                        ${audio}
                        <div style="margin-top:8px; font-size:14px; color:gray;">❤️ ${post.likes ? post.likes.length : 0} Likes</div>
                        <button onclick="likePost('${postId}')" style="margin-top:5px; padding:6px; font-size:12px;">Like Post</button>
                    </div>
                `;
            });
        }

        async function likePost(postId) {
            const user = window.firebaseAuth.currentUser;
            const postRef = window.fbDoc(window.firebaseDb, "posts", postId);
            await window.fbUpdateDoc(postRef, {
                likes: window.fbArrayUnion(user.email)
            });
            loadPosts();
        }

        // --- STORIES ---
        async function handleCreateStory() {
            const url = document.getElementById('story-url').value;
            const user = window.firebaseAuth.currentUser;
            if(!url) return alert("Enter image URL");

            await window.fbAddDoc(window.fbCollection(window.firebaseDb, "stories"), {
                author: user.email, url, timestamp: Date.now()
            });
            document.getElementById('story-url').value = '';
            loadStories();
        }

        async function loadStories() {
            const container = document.getElementById('stories-container');
            const snapshot = await window.fbGetDocs(window.fbCollection(window.firebaseDb, "stories"));
            container.innerHTML = '';
            const now = Date.now();
            const twentyFourHours = 24 * 60 * 60 * 1000;

            snapshot.forEach((docSnap) => {
                const story = docSnap.data();
                if ((now - story.timestamp) < twentyFourHours) {
                    container.innerHTML += `
                        <div style="text-align:center;">
                            <img src="${story.url}" style="width:55px; height:55px; border-radius:50%; border:2px solid var(--primary-color); object-fit:cover;">
                            <div style="font-size:10px; margin-top:2px;">@${story.author.split('@')[0]}</div>
                        </div>
                    `;
                }
            });
        }

        // --- REALTIME CHAT ---
        async function sendChatMessage() {
            const text = document.getElementById('chat-input').value;
            const user = window.firebaseAuth.currentUser;
            if(!text) return;

            await window.fbAddDoc(window.fbCollection(window.firebaseDb, "chats"), {
                sender: user.email, text, timestamp: Date.now()
            });
            document.getElementById('chat-input').value = '';
        }

        function loadChatMessages() {
            const chatBox = document.getElementById('chat-messages');
            const q = window.fbQuery(window.fbCollection(window.firebaseDb, "chats"), window.fbOrderBy("timestamp", "asc"));
            window.fbOnSnapshot(q, (snapshot) => {
                chatBox.innerHTML = '';
                const currentUser = window.firebaseAuth.currentUser;
                snapshot.forEach((docSnap) => {
                    const msg = docSnap.data();
                    let isMy = currentUser && msg.sender === currentUser.email;
                    chatBox.innerHTML += `
                        <div class="msg ${isMy ? 'msg-my' : 'msg-other'}">
                            <span style="font-size:10px; display:block; opacity:0.7;">@${msg.sender.split('@')[0]}</span>
                            ${msg.text}
                        </div>
                    `;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }
    </script>
</body>
</html>
